<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity 设计模式全鉴</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-card: #111827;
            --bg-card-hover: #162032;
            --bg-surface: #0f1629;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --warm: #f59e0b;
            --sky: #38bdf8;
            --rose: #f43f5e;
            --text: #e2e8f0;
            --text-muted: #8892a8;
            --border: #1e293b;
            --border-light: #2d3a52;
            --code-bg: #0d1117;
            --kw: #7ee787;
            --type: #79c0ff;
            --str: #ffa657;
            --cmt: #6e7681;
            --num: #d2a8ff;
            --unity: #ff7b72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 导航栏 */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .nav-logo .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #059669);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
        }

        .search-box {
            position: relative;
            width: 320px;
        }

        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 16px 8px 40px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-box i {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .nav-stats {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .nav-stats span strong {
            color: var(--accent);
            font-weight: 700;
        }

        /* Hero */
        #hero {
            position: relative;
            z-index: 1;
            padding: 120px 2rem 60px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-glow);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 999px;
            padding: 6px 18px;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 24px;
            animation: fadeInDown 0.6s ease;
        }

        .hero-badge .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease 0.1s both;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, var(--accent), #34d399, var(--warm));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 680px;
            margin: 0 auto 40px;
            animation: fadeInDown 0.6s ease 0.2s both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat .num {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            line-height: 1;
        }

        .hero-stat .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .hero-stat:nth-child(2) .num { color: var(--warm); }
        .hero-stat:nth-child(3) .num { color: var(--sky); }

        /* 过滤标签 */
        #filters {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 2rem 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 20px;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover {
            border-color: var(--border-light);
            background: rgba(255,255,255,0.07);
            color: var(--text);
        }

        .filter-btn.active {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: var(--accent);
        }

        .filter-btn .count {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.75rem;
        }

        .filter-btn.active .count {
            background: rgba(16,185,129,0.2);
        }

        /* 模式卡片网格 */
        #grid {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pattern-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .pattern-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pattern-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .pattern-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
        }

        .card-category {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .cat-creational { background: rgba(16,185,129,0.12); color: var(--accent); }
        .cat-structural { background: rgba(245,158,11,0.12); color: var(--warm); }
        .cat-behavioral { background: rgba(56,189,248,0.12); color: var(--sky); }

        .card-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-name-en {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .card-def {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            font-size: 0.72rem;
            padding: 3px 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            color: var(--text-muted);
        }

        .card-key {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .card-key i { color: var(--accent); }

        .card-key span { color: var(--text); font-weight: 500; }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* 详情模态框 */
        #modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(5, 8, 18, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        #modal {
            position: fixed;
            top: 0; right: 0;
            width: min(720px, 92vw);
            height: 100vh;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            z-index: 201;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
        }

        #modal.show { transform: translateX(0); }

        .modal-header {
            position: sticky;
            top: 0;
            background: rgba(15, 22, 41, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
        }

        .modal-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .modal-name-en {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .modal-close {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(244,63,94,0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .modal-body {
            padding: 32px;
        }

        .modal-section {
            margin-bottom: 32px;
        }

        .modal-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .modal-section-title i { color: var(--accent); }

        .modal-def {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text);
            padding: 16px 20px;
            background: rgba(16,185,129,0.06);
            border-left: 3px solid var(--accent);
            border-radius: 0 10px 10px 0;
        }

        .modal-key-idea {
            font-size: 1rem;
            color: var(--text);
            line-height: 1.7;
        }

        .modal-key-idea strong { color: var(--accent); }

        /* 参与者角色 */
        .participant-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .participant-item .role-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .participant-item .role-name {
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 100px;
        }

        .participant-item .role-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Unity场景 */
        .scene-card {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .scene-card i {
            color: var(--warm);
            font-size: 1.3rem;
            margin-top: 2px;
        }

        .scene-card p {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        /* 代码块 */
        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }

        .code-dots {
            display: flex; gap: 6px;
        }

        .code-dots span {
            width: 10px; height: 10px;
            border-radius: 50%;
        }

        .code-dots span:nth-child(1) { background: #f43f5e; }
        .code-dots span:nth-child(2) { background: #f59e0b; }
        .code-dots span:nth-child(3) { background: #10b981; }

        .code-lang {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .code-copy {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            padding: 4px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .code-copy:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .code-copy.copied {
            border-color: var(--accent);
            color: var(--accent);
        }

        .code-content {
            padding: 16px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.65;
            tab-size: 4;
        }

        .code-content .kw { color: var(--kw); }
        .code-content .type { color: var(--type); }
        .code-content .str { color: var(--str); }
        .code-content .cmt { color: var(--cmt); font-style: italic; }
        .code-content .num { color: var(--num); }
        .code-content .unity { color: var(--unity); }
        .code-content .fn { color: #d2a8ff; }

        /* 优缺点 */
        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .pros-list, .cons-list {
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .pros-list {
            background: rgba(16,185,129,0.04);
        }

        .cons-list {
            background: rgba(244,63,94,0.04);
        }

        .pros-list h4 {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cons-list h4 {
            font-size: 0.85rem;
            color: var(--rose);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pros-list li, .cons-list li {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 6px;
            list-style: none;
            padding-left: 16px;
            position: relative;
        }

        .pros-list li::before {
            content: '';
            position: absolute;
            left: 0; top: 9px;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        .cons-list li::before {
            content: '';
            position: absolute;
            left: 0; top: 9px;
            width: 6px; height: 6px;
            background: var(--rose);
            border-radius: 50%;
        }

        /* 相关模式 */
        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-tag {
            padding: 6px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .related-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .card-enter {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-enter.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px 24px;
            color: var(--accent);
            font-size: 0.9rem;
            z-index: 999;
            transition: transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .nav-stats { display: none; }
            .search-box { width: 180px; }
            #hero { padding: 100px 1rem 40px; }
            .hero-stats { gap: 24px; }
            .hero-stat .num { font-size: 1.8rem; }
            #grid { padding: 0 1rem 60px; grid-template-columns: 1fr; }
            #modal { width: 100vw; }
            .modal-body { padding: 20px; }
            .pros-cons { grid-template-columns: 1fr; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particles"></canvas>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-logo">
            <div class="logo-icon"><i class="fas fa-cubes"></i></div>
            <span>Unity Patterns</span>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索设计模式..." aria-label="搜索设计模式">
        </div>
        <div class="nav-stats">
            <span><strong>12</strong> 个模式</span>
            <span><strong>3</strong> 种分类</span>
            <span><strong>C#</strong> 代码示例</span>
        </div>
    </nav>

    <!-- Hero -->
    <section id="hero">
        <div class="hero-badge">
            <span class="dot"></span>
            Unity 游戏开发必备知识
        </div>
        <h1 class="hero-title">掌握 <span class="highlight">设计模式</span><br>构建更优雅的游戏架构</h1>
        <p class="hero-desc">深入理解 Unity 开发中最常用的 12 种设计模式，每个模式都配有真实场景说明和可运行的 C# 代码示例，助你写出可维护、可扩展的游戏代码。</p>
        <div class="hero-stats">
            <div class="hero-stat">
                <span class="num" id="statPatterns">0</span>
                <div class="label">设计模式</div>

            code: `public class BulletPool : MonoBehaviour
{
    [SerializeField] private GameObject bulletPrefab;
    [SerializeField] private int initialSize = 20;

    private Queue<GameObject> pool = new Queue<GameObject>();

    void Start()
    {
        // 预热：预先创建对象
        for (int i = 0; i < initialSize; i++)
        {
            GameObject obj = Instantiate(bulletPrefab);
            obj.SetActive(false);
            obj.transform.SetParent(transform);
            pool.Enqueue(obj);
        }
    }

    // 从池中获取对象
    public GameObject GetBullet(Vector3 position, Quaternion rotation)
    {
        GameObject bullet;

        if (pool.Count > 0)
        {
            bullet = pool.Dequeue();
        }
        else
        {
            // 池为空时动态扩容
            bullet = Instantiate(bulletPrefab);
            bullet.transform.SetParent(transform);
        }

        bullet.transform.position = position;
        bullet.transform.rotation = rotation;
        bullet.SetActive(true);
        return bullet;
    }

    // 将对象归还到池中
    public void ReturnBullet(GameObject bullet)
    {
        bullet.SetActive(false);
        bullet.transform.SetParent(transform);
        pool.Enqueue(bullet);
    }
}

    }

    {

    }

public class InputHandler : MonoBehaviour

    private Stack<ICommand> history = new Stack<ICommand>();
    private float moveDistance = 1f;

    void Update()
    {
        ICommand cmd = null;

        if (Input.GetKeyDown(KeyCode.W))
            cmd = new MoveCommand(transform, Vector3.forward, moveDistance);
        else if (Input.GetKeyDown(KeyCode.S))
            cmd = new MoveCommand(transform, Vector3.back, moveDistance);
        else if (Input.GetKeyDown(KeyCode.A))
            cmd = new MoveCommand(transform, Vector3.left, moveDistance);
        else if (Input.GetKeyDown(KeyCode.D))
            cmd = new MoveCommand(transform, Vector3.right, moveDistance);
        else if (Input.GetKeyDown(KeyCode.Z))
        {
            // 撤销上一步操作
            if (history.Count > 0)
                history.Pop().Undo();
            return;
        }

        if (cmd != null)
        {
            cmd.Execute();
            history.Push(cmd);
        }
    }
}`,

        // 提取注释和字符串，用占位符保护
        const tokens = [];
        let tokenId = 0;

        // 多行注释
        code = code.replace(/(\/\*[\s\S]*?\*\/)/g, (m) => {
            const id = `__TOKEN_${tokenId++}__`;
            tokens.push({ id, html: `<span class="cmt">${m}</span>` });
            return id;
        });

        // 单行注释
        code = code.replace(/(\/\/.*)/g, (m) => {

            return id;

        // 字符串（含插值字符串）
        code = code.replace(/(\$?"(?:[^"\\]|\\.)*")/g, (m) => {
            const id = `__TOKEN_${tokenId++}__`;
            tokens.push({ id, html: `<span class="str">${m}</span>` });
            return id;

        const utRegex = new RegExp(`\\b(${unityTypes.join('|')})\\b`, 'g');

    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createParticles() {
        particles = [];
        const count = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 15000));
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                r: Math.random() * 2 + 1,
                opacity: Math.random() * 0.4 + 0.1
            });
        }
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 连线
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    const alpha = (1 - dist / 150) * 0.15;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(16, 185, 129, ${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        // 粒子
        particles.forEach(p => {
            // 鼠标排斥
            const dx = p.x - mouse.x;
            const dy = p.y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120 && dist > 0) {
                p.vx += (dx / dist) * 0.15;
                p.vy += (dy / dist) * 0.15;
            }

            p.x += p.vx;
            p.y += p.vy;

            // 阻尼
            p.vx *= 0.99;
            p.vy *= 0.99;

            // 边界
            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            p.x = Math.max(0, Math.min(canvas.width, p.x));
            p.y = Math.max(0, Math.min(canvas.height, p.y));

            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(16, 185, 129, ${p.opacity})`;
            ctx.fill();
        });

        requestAnimationFrame(drawParticles);
    }

    resizeCanvas();
    createParticles();
    drawParticles();

    window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // ==================== 数字递增动画 ====================
    function animateNumber(el, target, duration = 1200) {
        let start = 0;
        const startTime = performance.now();
        function step(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(ease * target);
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    // 统计代码行数
    let totalLines = 0;
    patterns.forEach(p => { totalLines += p.code.split('\n').length; });

    setTimeout(() => {
        animateNumber(document.getElementById('statPatterns'), patterns.length);
        animateNumber(document.getElementById('statCategories'), 3);
        animateNumber(document.getElementById('statLines'), totalLines);
    }, 400);

    // ==================== 渲染卡片 ====================
    const grid = document.getElementById('grid');
    const categoryNames = { creational: '创建型', structural: '结构型', behavioral: '行为型' };
    const categoryClasses = { creational: 'cat-creational', structural: 'cat-structural', behavioral: 'cat-behavioral' };

    let currentFilter = 'all';
    let searchQuery = '';

    function getFilteredPatterns() {
        return patterns.filter(p => {
            const matchCat = currentFilter === 'all' || p.category === currentFilter;
            const matchSearch = searchQuery === '' ||
                p.name.toLowerCase().includes(searchQuery) ||
                p.nameEn.toLowerCase().includes(searchQuery) ||
                p.definition.toLowerCase().includes(searchQuery);
            return matchCat && matchSearch;
        });
    }

    function renderGrid() {
        const filtered = getFilteredPatterns();
        grid.innerHTML = '';

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>没有找到匹配的设计模式</p>
                </div>`;
            return;
        }

        filtered.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'pattern-card card-enter';
            card.style.setProperty('--card-accent', p.color);
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `查看${p.name}详情`);

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, ${p.color}, ${p.color}88)">
                        <i class="fas ${p.icon}"></i>
                    </div>
                    <span class="card-category ${categoryClasses[p.category]}">${categoryNames[p.category]}</span>
                </div>
                <div class="card-name">${p.name}</div>
                <div class="card-name-en">${p.nameEn}</div>
                <div class="card-def">${p.definition.substring(0, 60)}...</div>
                <div class="card-key">
                    <i class="fas fa-lightbulb"></i>
                    <span>${p.keyIdea.substring(0, 40).replace(/<[^>]*>/g, '')}...</span>
                </div>
            `;

            card.addEventListener('click', () => openModal(p.id));
            card.addEventListener('keydown', (e) => { if (e.key === 'Enter') openModal(p.id); });

            grid.appendChild(card);

            // 延迟出现动画
            setTimeout(() => card.classList.add('visible'), 60 * i);
        });
    }

    // ==================== 过滤器 ====================
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.cat;
            renderGrid();
        });
    });

    // ==================== 搜索 ====================
    const searchInput = document.getElementById('searchInput');
    let searchTimer;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            searchQuery = searchInput.value.trim().toLowerCase();
            renderGrid();
        }, 200);
    });

    // ==================== 模态框 ====================
    const modalOverlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');

    function openModal(patternId) {
        const p = patterns.find(x => x.id === patternId);
        if (!p) return;

        document.getElementById('modalIcon').style.background = `linear-gradient(135deg, ${p.color}, ${p.color}88)`;
        document.getElementById('modalIcon').innerHTML = `<i class="fas ${p.icon}"></i>`;
        document.getElementById('modalName').textContent = p.name;
        document.getElementById('modalNameEn').textContent = p.nameEn + ' · ' + categoryNames[p.category];

        // 构建详情内容
        let html = '';

        // 定义
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-book"></i> 定义</div>
            <div class="modal-def">${p.definition}</div>
        </div>`;

        // 核心思想
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-lightbulb"></i> 核心思想</div>
            <div class="modal-key-idea">${p.keyIdea}</div>
        </div>`;

        // 参与者
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-users"></i> 参与者角色</div>
            <div class="participant-list">
                ${p.participants.map(pt => `
                    <div class="participant-item">
                        <div class="role-dot" style="background: ${pt.color}"></div>
                        <span class="role-name">${pt.name}</span>
                        <span class="role-desc">${pt.desc}</span>
                    </div>
                `).join('')}
            </div>
        </div>`;

        // Unity场景
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-gamepad"></i> Unity 应用场景</div>
            <div class="scene-card">
                <i class="fas fa-unity"></i>
                <p>${p.unityScene}</p>
            </div>
        </div>`;

        // 代码
        const highlightedCode = highlightCSharp(p.code);
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-code"></i> C# 代码示例</div>
            <div class="code-block">
                <div class="code-header">
                    <div class="code-dots"><span></span><span></span><span></span></div>
                    <span class="code-lang">C#</span>
                    <button class="code-copy" onclick="copyCode('${p.id}')">
                        <i class="fas fa-copy"></i> 复制
                    </button>
                </div>
                <pre class="code-content" id="code-${p.id}">${highlightedCode}</pre>
            </div>
        </div>`;

        // 优缺点
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-balance-scale"></i> 优缺点分析</div>
            <div class="pros-cons">
                <div class="pros-list">
                    <h4><i class="fas fa-check-circle"></i> 优点</h4>
                    <ul>${p.pros.map(pro => `<li>${pro}</li>`).join('')}</ul>
                </div>
                <div class="cons-list">
                    <h4><i class="fas fa-exclamation-circle"></i> 缺点</h4>
                    <ul>${p.cons.map(con => `<li>${con}</li>`).join('')}</ul>
                </div>
            </div>
        </div>`;

        // 相关模式
        html += `
        <div class="modal-section">
            <div class="modal-section-title"><i class="fas fa-link"></i> 相关模式</div>
            <div class="related-list">
                ${p.related.map(r => {
                    const rp = patterns.find(x => x.name === r);
                    return `<span class="related-tag" onclick="${rp ? `openModal('${rp.id}')` : ''}">${r}</span>`;
                }).join('')}
            </div>
        </div>`;

        document.getElementById('modalBody').innerHTML = html;

        // 显示模态框
        modalOverlay.classList.add('show');
        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
        modal.scrollTop = 0;
    }

    function closeModal() {
        modal.classList.remove('show');
        setTimeout(() => {
            modalOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }, 100);
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
    });

    // ==================== 复制代码 ====================
    function copyCode(patternId) {
        const p = patterns.find(x => x.id === patternId);
        if (!p) return;
        navigator.clipboard.writeText(p.code).then(() => {
            showToast('代码已复制到剪贴板');
        }).catch(() => {
            showToast('复制失败，请手动选择复制');
        });
    }

    // ==================== Toast ====================
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ==================== 初始化 ====================
    renderGrid();
    </script>
</body>
</html>
