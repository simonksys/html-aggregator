<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity 设计模式指南</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d47;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-bright: #f8fafc;
    --code-bg: #0d1117;
    --glow: 0 0 20px rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid BG */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 60px 0 40px;
    text-align: center;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 32px auto 0;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 999px;
    padding: 6px 18px; font-size: 12px;
    color: var(--accent); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .badge::before { content: '◆'; font-size: 8px; }
  h1 {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  .subtitle {
    margin-top: 16px; font-size: 1rem;
    color: var(--text-dim); letter-spacing: 0.5px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; justify-content: center; gap: 40px;
    padding: 24px 0 40px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 700;
    color: var(--accent);
  }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* ── CATEGORY TABS ── */
  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 40px;
  }
  .tab {
    padding: 8px 20px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  /* ── PATTERN GRID ── */
  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px; margin-bottom: 60px;
  }

  /* ── PATTERN CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--card-color, var(--accent));
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 20px var(--card-glow, rgba(0,212,255,0.1));
  }
  .card-header {
    padding: 20px 24px 16px;
    display: flex; align-items: flex-start; gap: 16px;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .card-header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-color, var(--accent));
  }
  .icon-wrap {
    width: 48px; height: 48px; border-radius: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .card-meta { flex: 1; }
  .card-name {
    font-size: 1.05rem; font-weight: 700;
    color: var(--text-bright); margin-bottom: 4px;
  }
  .card-category {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--card-color, var(--accent));
  }
  .card-body { padding: 16px 24px; flex: 1; }
  .card-desc { font-size: 13.5px; color: var(--text-dim); line-height: 1.7; }
  .card-tags {
    padding: 12px 24px 20px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 4px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
  }
  .card.hidden { display: none; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 820px;
    max-height: 88vh; overflow-y: auto;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s;
    position: relative;
  }
  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-top-bar {
    height: 3px;
    background: var(--modal-color, var(--accent));
    border-radius: 16px 16px 0 0;
  }
  .modal-header {
    padding: 28px 32px 20px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 10;
  }
  .modal-icon {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(0,0,0,0.4); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .modal-title-group { flex: 1; }
  .modal-title {
    font-size: 1.5rem; font-weight: 900;
    color: var(--text-bright);
  }
  .modal-subtitle {
    font-size: 12px; color: var(--modal-color, var(--accent));
    text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;
  }
  .close-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.2s;
  }
  .close-btn:hover { color: var(--text-bright); border-color: var(--text-dim); }

  .modal-body { padding: 28px 32px; }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .desc-block {
    background: var(--surface2); border-radius: 10px;
    padding: 18px 20px; margin-bottom: 24px;
    border-left: 3px solid var(--modal-color, var(--accent));
    font-size: 14px; line-height: 1.8; color: var(--text);
  }

  .pros-cons {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 24px;
  }
  .pros, .cons {
    background: var(--surface2); border-radius: 10px; padding: 16px;
  }
  .pros { border-top: 2px solid var(--accent3); }
  .cons { border-top: 2px solid var(--accent5); }
  .pros h4 { color: var(--accent3); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .cons h4 { color: var(--accent5); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .pros li, .cons li {
    font-size: 13px; color: var(--text-dim); line-height: 1.6;
    padding-left: 14px; position: relative; margin-bottom: 6px;
    list-style: none;
  }
  .pros li::before { content: '+'; position: absolute; left: 0; color: var(--accent3); font-weight: 700; }
  .cons li::before { content: '−'; position: absolute; left: 0; color: var(--accent5); font-weight: 700; }

  .use-cases {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .use-case {
    background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
    border-radius: 6px; padding: 6px 12px;
    font-size: 12px; color: #a78bfa;
  }

  /* Code block */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 24px;
  }
  .code-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  pre {
    padding: 20px; overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.7;
    color: #cdd6f4;
    tab-size: 4;
  }
  .kw { color: #cba6f7; }
  .str { color: #a6e3a1; }
  .cm { color: #6c7086; font-style: italic; }
  .cn { color: #89b4fa; }
  .fn { color: #89dceb; }
  .num { color: #fab387; }
  .tp { color: #f9e2af; }

  /* Diagram */
  .diagram-wrap {
    background: var(--surface2); border-radius: 10px;
    padding: 20px; margin-bottom: 24px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .diagram-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 16px;
  }
  .diagram-svg svg { max-width: 100%; height: auto; }

  /* Scrollbar */
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Footer */
  footer {
    text-align: center; padding: 40px 0;
    border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px;
  }
  footer span { color: var(--accent); }

  @media (max-width: 640px) {
    .pattern-grid { grid-template-columns: 1fr; }
    .pros-cons { grid-template-columns: 1fr; }
    .modal-body { padding: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">Unity · C# · Game Programming</div>
    <h1>Unity 设计模式<br>完全指南</h1>
    <p class="subtitle">掌握游戏开发中的核心设计模式 · 写出更优雅、可维护的代码</p>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num">10</div><div class="stat-label">设计模式</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">分类体系</div></div>
    <div class="stat"><div class="stat-num">10+</div><div class="stat-label">代码示例</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-label">可复用性</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="all">全部模式</button>
    <button class="tab" data-filter="creational">创建型</button>
    <button class="tab" data-filter="behavioral">行为型</button>
    <button class="tab" data-filter="structural">结构型</button>
  </div>

  <div class="pattern-grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-top-bar" id="modalBar"></div>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title-group">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="container">
  <footer>
    基于 Unity 官方文档 · Game Programming Patterns · 开源社区资料整理 &nbsp;|&nbsp; Made with <span>♥</span> for Unity Developers
  </footer>
</div>

<script>
const patterns = [
  {
    id: 'singleton',
    name: '单例模式',
    enName: 'Singleton Pattern',
    icon: '👑',
    category: 'creational',
    categoryLabel: '创建型',
    color: '#f59e0b',
    glow: 'rgba(245,158,11,0.12)',
    desc: '确保一个类只有一个实例，并提供全局访问点。适用于 GameManager、AudioManager、SceneManager 等全局管理器。',
    fullDesc: '单例模式（Singleton）是 Unity 中最常用的设计模式之一。它保证某个类在整个应用程序生命周期内只存在一个实例，并提供一个全局的访问点。在 Unity 中，通常用于管理游戏状态、音频、场景切换等需要跨场景保持的系统。但需谨慎使用，过度依赖单例会导致代码耦合度过高。',
    pros: ['确保全局唯一实例', '全局访问方便', '避免重复初始化', '跨场景持久化'],
    cons: ['容易过度使用', '代码耦合度高', '难以进行单元测试', '违反单一职责原则'],
    useCases: ['GameManager 游戏管理器', 'AudioManager 音效管理器', 'UIManager 界面管理器', 'SaveSystem 存档系统', '场景加载管理器'],
    tags: ['MonoBehaviour', 'DontDestroyOnLoad', 'static'],
    code: `<span class="kw">public class</span> <span class="tp">GameManager</span> : <span class="cn">MonoBehaviour</span>
{
    <span class="cm">// 静态实例引用</span>
    <span class="kw">public static</span> <span class="tp">GameManager</span> Instance { <span class="kw">get</span>; <span class="kw">private set</span>; }

    <span class="kw">public int</span> Score { <span class="kw">get</span>; <span class="kw">private set</span>; }
    <span class="kw">public bool</span> IsGameOver { <span class="kw">get</span>; <span class="kw">private set</span>; }

    <span class="kw">private void</span> <span class="fn">Awake</span>()
    {
        <span class="cm">// 检查是否已存在实例</span>
        <span class="kw">if</span> (Instance != <span class="kw">null</span> && Instance != <span class="kw">this</span>)
        {
            <span class="cn">Destroy</span>(gameObject);
            <span class="kw">return</span>;
        }
        Instance = <span class="kw">this</span>;
        <span class="cn">DontDestroyOnLoad</span>(gameObject); <span class="cm">// 跨场景保持</span>
    }

    <span class="kw">public void</span> <span class="fn">AddScore</span>(<span class="kw">int</span> points)
    {
        Score += points;
        <span class="cn">Debug</span>.<span class="fn">Log</span>(<span class="str">$"分数: {Score}"</span>);
    }
}

<span class="cm">// 使用方式：在任意脚本中访问</span>
<span class="cn">GameManager</span>.Instance.<span class="fn">AddScore</span>(<span class="num">10</span>);`,
    diagram: `<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
      <rect x="140" y="20" width="120" height="60" rx="8" fill="#1a2235" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="200" y="45" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="12" font-weight="bold">GameManager</text>
      <text x="200" y="65" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">Instance ►</text>
      <rect x="20" y="110" width="100" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="70" y="133" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">PlayerScript</text>
      <rect x="150" y="110" width="100" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="200" y="133" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">UIScript</text>
      <rect x="280" y="110" width="100" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="330" y="133" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">EnemyScript</text>
      <line x1="70" y1="110" x2="170" y2="80" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <line x1="200" y1="110" x2="200" y2="80" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <line x1="330" y1="110" x2="230" y2="80" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="200" y="170" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">所有脚本共享同一实例</text>
    </svg>`
  },
  {
    id: 'observer',
    name: '观察者模式',
    enName: 'Observer Pattern',
    icon: '📡',
    category: 'behavioral',
    categoryLabel: '行为型',
    color: '#00d4ff',
    glow: 'rgba(0,212,255,0.12)',
    desc: '定义对象间的一对多依赖，当一个对象状态改变时，所有依赖者都自动收到通知。在 Unity 中常用 UnityEvent 或 C# event 实现。',
    fullDesc: '观察者模式（Observer）建立了对象之间的松耦合通信机制。发布者（Subject）不需要知道订阅者（Observer）的具体实现，只需要在状态改变时发出通知。Unity 内置的 UnityEvent 和 C# 的 event/Action 都是该模式的实现。特别适合 UI 更新、游戏事件系统、成就系统等场景。',
    pros: ['松耦合，易扩展', '支持动态添加/移除订阅', '分离关注点', 'UI 与逻辑解耦'],
    cons: ['需要手动取消订阅防内存泄漏', '大量事件时难以追踪', '触发顺序可能不确定', '调试复杂度增加'],
    useCases: ['HP/分数 UI 更新', '成就解锁系统', '游戏状态广播', '音效触发系统', '玩家死亡事件'],
    tags: ['UnityEvent', 'event', 'Action', 'delegate'],
    code: `<span class="cm">// 事件发布者（Subject）</span>
<span class="kw">public class</span> <span class="tp">PlayerHealth</span> : <span class="cn">MonoBehaviour</span>
{
    <span class="kw">public static event</span> <span class="cn">Action</span>&lt;<span class="kw">int</span>&gt; OnHealthChanged;
    <span class="kw">public static event</span> <span class="cn">Action</span> OnPlayerDied;

    <span class="kw">private int</span> _currentHp = <span class="num">100</span>;

    <span class="kw">public void</span> <span class="fn">TakeDamage</span>(<span class="kw">int</span> dmg)
    {
        _currentHp -= dmg;
        OnHealthChanged?.Invoke(_currentHp); <span class="cm">// 通知所有观察者</span>

        <span class="kw">if</span> (_currentHp &lt;= <span class="num">0</span>)
            OnPlayerDied?.Invoke();
    }
}

<span class="cm">// 观察者（Observer）— UI脚本</span>
<span class="kw">public class</span> <span class="tp">HealthUI</span> : <span class="cn">MonoBehaviour</span>
{
    <span class="kw">private void</span> <span class="fn">OnEnable</span>()  => <span class="cn">PlayerHealth</span>.OnHealthChanged += <span class="fn">UpdateBar</span>;
    <span class="kw">private void</span> <span class="fn">OnDisable</span>() => <span class="cn">PlayerHealth</span>.OnHealthChanged -= <span class="fn">UpdateBar</span>;

    <span class="kw">void</span> <span class="fn">UpdateBar</span>(<span class="kw">int</span> hp) => hpBar.value = hp;
}`,
    diagram: `<svg viewBox="0 0 400 190" xmlns="http://www.w3.org/2000/svg">

    code: `<span class="kw">using</span> UnityEngine.Pool;

    <span class="kw">private</span> <span class="cn">ObjectPool</span>&lt;<span class="cn">GameObject</span>&gt; _pool;

    <span class="kw">private void</span> <span class="fn">Awake</span>()
    {
        _pool = <span class="kw">new</span> <span class="cn">ObjectPool</span>&lt;<span class="cn">GameObject</span>&gt;(
            createFunc:    () => <span class="cn">Instantiate</span>(bulletPrefab),
            actionOnGet:   b  => b.<span class="fn">SetActive</span>(<span class="kw">true</span>),

// Build cards
const grid = document.getElementById('grid');
patterns.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.category = p.category;
  card.style.setProperty('--card-color', p.color);
  card.style.setProperty('--card-glow', p.glow);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon-wrap">${p.icon}</div>
      <div class="card-meta">
        <div class="card-name">${p.name}</div>
        <div class="card-category">${p.categoryLabel} · ${p.enName}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-desc">${p.desc}</div>
    </div>
    <div class="card-tags">
      ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>`;
  card.addEventListener('click', () => openModal(p));
  grid.appendChild(card);
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const filter = tab.dataset.filter;
    document.querySelectorAll('.card').forEach(card => {
      if (filter === 'all' || card.dataset.category === filter) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });
  });
});

// Modal
function openModal(p) {
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  document.getElementById('modalBar').style.background = p.color;
  document.getElementById('modalIcon').textContent = p.icon;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalSubtitle').textContent = `${p.categoryLabel} · ${p.enName}`;
  modal.style.setProperty('--modal-color', p.color);

  document.getElementById('modalBody').innerHTML = `
    <div class="section-title">模式简介</div>
    <div class="desc-block">${p.fullDesc}</div>

    ${p.diagram ? `
    <div class="section-title">结构示意</div>
    <div class="diagram-wrap">
      <div class="diagram-title">UML 示意图</div>
      <div class="diagram-svg">${p.diagram}</div>
    </div>` : ''}

    <div class="section-title">适用场景</div>
    <div class="use-cases">
      ${p.useCases.map(u => `<span class="use-case">${u}</span>`).join('')}
    </div>

    <div class="pros-cons">
      <div class="pros">
        <h4>✦ 优点</h4>
        ${p.pros.map(x => `<li>${x}</li>`).join('')}
      </div>
      <div class="cons">
        <h4>✦ 注意事项</h4>
        ${p.cons.map(x => `<li>${x}</li>`).join('')}
      </div>
    </div>

    <div class="section-title">Unity C# 代码示例</div>
    <div class="code-block">
      <div class="code-toolbar">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="code-lang">C# · Unity</div>
      </div>
      <pre>${p.code}</pre>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
