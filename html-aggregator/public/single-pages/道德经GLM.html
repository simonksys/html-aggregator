<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道德经 · 老子</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0b0b10;
    --bg2: #111118;
    --card: rgba(22, 22, 32, 0.85);
    --card-hover: rgba(30, 30, 45, 0.95);
    --fg: #e8e0d0;
    --fg-muted: #8a8070;
    --accent: #c8a45c;
    --accent-dim: rgba(200, 164, 92, 0.15);
    --accent-glow: rgba(200, 164, 92, 0.3);
    --border: rgba(200, 164, 92, 0.12);
    --key-border: rgba(200, 164, 92, 0.5);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--accent-dim) transparent;
  }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景装饰 */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-gradient {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
  }

  .bg-g1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,164,92,0.12) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation: floatA 20s ease-in-out infinite;
  }

  .bg-g2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(120,80,40,0.1) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation: floatB 25s ease-in-out infinite;
  }

  .bg-g3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(200,164,92,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: floatC 30s ease-in-out infinite;
  }

  @keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
  @keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }
  @keyframes floatC { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-40%,-60%) scale(1.2)} }

  /* 颗粒纹理 */
  .bg-noise {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* 主容器 */
  .container {
    position: relative;
    z-index: 2;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* 顶部英雄区 */
  .hero {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 20px 40px;
    position: relative;
  }

  .hero-symbol {
    width: 80px; height: 80px;
    margin-bottom: 32px;
    position: relative;
    animation: rotateSlow 40s linear infinite;
  }

  .hero-symbol svg { width: 100%; height: 100%; }

  @keyframes rotateSlow { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .hero h1 {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--fg);
    margin-bottom: 12px;
    text-indent: 0.3em;
  }

  .hero .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: var(--accent);
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    margin-bottom: 28px;
    font-weight: 200;
  }

  .hero .desc {
    max-width: 600px;
    font-size: 0.95rem;
    color: var(--fg-muted);
    line-height: 2;
    font-weight: 200;
  }

  .hero-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 28px auto;
  }

  /* 统计条 */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--fg-muted);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* 筛选栏 */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(11,11,16,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    transition: box-shadow 0.3s;
  }

  .filter-bar.scrolled {
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  .filter-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.8rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .filter-btn {
    padding: 6px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--fg-muted);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  .search-box {
    margin-left: auto;
    position: relative;
  }

  .search-box input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px 6px 36px;
    color: var(--fg);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    width: 200px;
    outline: none;
    transition: all 0.3s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.06);
    width: 260px;
  }

  .search-box input::placeholder { color: var(--fg-muted); opacity: 0.5; }

  .search-box i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    font-size: 0.8rem;
  }

  /* 章节网格 */
  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 40px 0 80px;
  }

  /* 卡片 */
  .chapter-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
  }

  .chapter-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .chapter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .chapter-card:hover {
    background: var(--card-hover);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 60px var(--accent-dim);
    border-color: rgba(200,164,92,0.25);
  }

  .chapter-card:hover::before { opacity: 1; }

  /* 重点章节卡片 */
  .chapter-card.key-chapter {
    border-color: var(--key-border);
    background: rgba(30, 26, 18, 0.85);
  }

  .chapter-card.key-chapter::after {
    content: '要';
    position: absolute;
    top: 12px; right: 12px;
    width: 26px; height: 26px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chapter-card.key-chapter::before {
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .chapter-card.key-chapter:hover {
    background: rgba(40, 34, 22, 0.95);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 80px rgba(200,164,92,0.15);
  }

  .card-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-num {
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    font-weight: 600;
    white-space: nowrap;
  }

  .card-title {
    font-size: 0.82rem;
    color: var(--fg-muted);
    font-weight: 200;
  }

  .card-excerpt {
    font-size: 0.92rem;
    line-height: 1.9;
    color: var(--fg);
    font-weight: 400;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tag {
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 10px;
    border-radius: 10px;
    letter-spacing: 0.05em;
  }

  .card-read {
    font-size: 0.75rem;
    color: var(--fg-muted);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .chapter-card:hover .card-read { opacity: 1; }

  /* 模态框 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 0;
    transform: scale(0.9) translateY(30px);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    scrollbar-width: thin;
    scrollbar-color: var(--accent-dim) transparent;
    position: relative;
  }

  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  .modal-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(180deg, var(--bg2) 80%, transparent);
    padding: 32px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-chapter-label {
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    font-weight: 600;
  }

  .modal-key-badge {
    font-size: 0.72rem;
    color: var(--bg);
    background: var(--accent);
    padding: 2px 12px;
    border-radius: 10px;
    margin-left: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .modal-close {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    color: var(--fg-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.3s;
  }

  .modal-close:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .modal-body {
    padding: 0 40px 40px;
  }

  .modal-section {
    margin-bottom: 32px;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section-title {
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-section-title i {
    font-size: 0.85rem;
  }

  .modal-original {
    font-size: 1.1rem;
    line-height: 2.2;
    color: var(--fg);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .modal-translation {
    font-size: 0.95rem;
    line-height: 2;
    color: rgba(232,224,208,0.75);
    font-weight: 200;
  }

  .modal-insight {
    font-size: 0.9rem;
    line-height: 2;
    color: rgba(232,224,208,0.65);
    font-weight: 200;
    padding: 16px 20px;
    background: var(--accent-dim);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  .modal-key-concepts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .concept-tag {
    padding: 4px 14px;
    background: rgba(200,164,92,0.08);
    border: 1px solid rgba(200,164,92,0.15);
    border-radius: 16px;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  /* 模态框导航 */
  .modal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-top: 1px solid var(--border);
    position: sticky;
    bottom: 0;
    background: var(--bg2);
  }

  .modal-nav-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--fg-muted);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .modal-nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .modal-nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* 返回顶部 */
  .back-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 100;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
  }

  .back-top.show {
    opacity: 1;
    transform: translateY(0);
  }

  .back-top:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* 页脚 */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--fg-muted);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
  }

  /* 空状态 */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--fg-muted);
  }

  .empty-state i {
    font-size: 2.5rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .hero h1 { letter-spacing: 0.15em; text-indent: 0.15em; }
    .stats-bar { gap: 28px; }
    .chapters-grid { grid-template-columns: 1fr; }
    .modal-body { padding: 0 24px 32px; }
    .modal-header { padding: 24px 24px 16px; }
    .modal-nav { padding: 16px 24px; }
    .modal-original { font-size: 1rem; }
    .search-box input { width: 140px; }
    .search-box input:focus { width: 180px; }
    .filter-inner { gap: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-gradient bg-g1"></div>
  <div class="bg-gradient bg-g2"></div>
  <div class="bg-gradient bg-g3"></div>
</div>
<div class="bg-noise"></div>

<!-- 英雄区 -->
<header class="hero">
  <div class="hero-symbol">
    <svg viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="45" stroke="rgba(200,164,92,0.3)" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="35" stroke="rgba(200,164,92,0.2)" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="25" stroke="rgba(200,164,92,0.15)" stroke-width="0.5"/>
      <path d="M50 5 L50 95 M5 50 L95 50" stroke="rgba(200,164,92,0.1)" stroke-width="0.5"/>
      <!-- 太极简化 -->
      <path d="M50 10 A40 40 0 0 1 50 90 A20 20 0 0 0 50 50 A20 20 0 0 1 50 10" fill="rgba(200,164,92,0.15)" stroke="rgba(200,164,92,0.4)" stroke-width="1"/>
      <path d="M50 90 A40 40 0 0 1 50 10 A20 20 0 0 0 50 50 A20 20 0 0 1 50 90" fill="none" stroke="rgba(200,164,92,0.4)" stroke-width="1"/>
      <circle cx="50" cy="30" r="4" fill="rgba(200,164,92,0.5)"/>
      <circle cx="50" cy="70" r="4" fill="rgba(11,11,16,0.8)" stroke="rgba(200,164,92,0.4)" stroke-width="1"/>
    </svg>
  </div>
  <h1>道德经</h1>
  <div class="subtitle">老子 · 春秋</div>
  <div class="hero-line"></div>
  <p class="desc">
    道可道，非常道。五千言微言大义，八十一章包罗万象。<br>
    点击任一章节卡片，即可阅读原文、译文与核心解读。
  </p>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num">81</div>
      <div class="stat-label">章 节</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">5162</div>
      <div class="stat-label">字 数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">17</div>
      <div class="stat-label">重点章</div>
    </div>
  </div>
</header>

<!-- 筛选栏 -->
<nav class="filter-bar" id="filterBar">
  <div class="filter-inner">
    <span class="filter-label"><i class="fas fa-filter" style="margin-right:6px"></i>筛选</span>
    <button class="filter-btn active" data-filter="all">全部章节</button>
    <button class="filter-btn" data-filter="key">重点章节</button>
    <button class="filter-btn" data-filter="dao">道之本体</button>
    <button class="filter-btn" data-filter="de">德之修行</button>
    <button class="filter-btn" data-filter="wu">无为而治</button>
    <button class="filter-btn" data-filter="rou">柔弱胜强</button>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="搜索章节内容..." aria-label="搜索章节">
    </div>
  </div>
</nav>

<!-- 章节网格 -->
<main class="container">
  <div class="chapters-grid" id="chaptersGrid"></div>
</main>

<!-- 模态框 -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <span class="modal-chapter-label" id="modalLabel"></span>
        <span class="modal-key-badge" id="modalKeyBadge" style="display:none">重点</span>
      </div>
      <button class="modal-close" id="modalClose" aria-label="关闭"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-nav">
      <button class="modal-nav-btn" id="prevBtn"><i class="fas fa-arrow-left" style="margin-right:6px"></i>上一章</button>
      <span style="font-size:0.78rem;color:var(--fg-muted)" id="navIndicator"></span>
      <button class="modal-nav-btn" id="nextBtn">下一章<i class="fas fa-arrow-right" style="margin-left:6px"></i></button>
    </div>
  </div>
</div>

<!-- 返回顶部 -->
<button class="back-top" id="backTop" aria-label="返回顶部"><i class="fas fa-chevron-up"></i></button>

<footer>
  道德经 · 老子 · 八十一章 &nbsp;|&nbsp; 本页面仅供学习参考
</footer>

<script>
// ============ 《道德经》81章完整数据 ============
const chapters = [
  {
    id:1, key:true, tag:"dao",
    title:"众妙之门",
    text:"道可道，非常道；名可名，非常名。无名，天地之始；有名，万物之母。故常无欲，以观其妙；常有欲，以观其徼。此两者同出而异名，同谓之玄。玄之又玄，众妙之门。",
    trans:"可以说出来的道，就不是永恒不变的道；可以叫出来的名，就不是永恒不变的名。无，是天地的开端；有，是万物的根源。所以常从无中观察道的奥妙，常从有中观察道的边界。无和有两者同出一源而名称不同，都可以称之为玄妙。玄妙又玄妙，正是一切奥妙的大门。",
    insight:"本章是《道德经》的总纲。老子开篇即指出：道超越语言和概念，不可被完全定义。「无」与「有」是理解道的两把钥匙——无，指向道的无限可能性；有，指向道的具体显现。修道的关键在于在无与有之间自由切换视角。",
    concepts:["道","无/有","玄"]
  },
  {
    id:2, key:false, tag:"dao",
    title:"有无相生",
    text:"天下皆知美之为美，斯恶已；皆知善之为善，斯不善已。有无相生，难易相成，长短相形，高下相盈，音声相和，前后相随，恒也。是以圣人处无为之事，行不言之教；万物作而弗始，生而弗有，为而弗恃，功成而弗居。夫唯弗居，是以不去。",
    trans:"天下都知道美之所以为美，丑的观念就产生了；都知道善之所以为善，不善的观念就产生了。有和无互相生成，难和易互相促成，长和短互相比较，高和下互相依存，音和声互相和谐，前和后互相跟随——这是永恒的规律。因此圣人以无为的原则处事，以不言的方式教化；万物兴起而不干预，生养而不占有，施为而不自恃，功成而不居功。正因为不居功，所以功绩不会失去。",
    insight:"本章揭示辩证法的核心：一切概念都依其对立面而存在。美丑、善恶、有无并非绝对，而是相对相生。圣人深谙此理，故行无为、不言之教——不是不做事，而是不强加人为意志，顺其自然。",
    concepts:["辩证","无为","不言之教"]
  },
  {
    id:3, key:false, tag:"wu",
    title:"虚心实腹",
    text:"不尚贤，使民不争；不贵难得之货，使民不为盗；不见可欲，使民心不乱。是以圣人之治，虚其心，实其腹，弱其志，强其骨。常使民无知无欲，使夫智者不敢为也。为无为，则无不治。",
    trans:"不推崇贤能，使百姓不争竞；不珍视难得之货，使百姓不偷盗；不显耀可贪之物，使百姓心不乱。因此圣人治天下：清空他们的心机，填饱他们的肚子，削弱他们的贪欲，强健他们的筋骨。常使百姓没有伪诈的心智和贪欲，使自作聪明的人不敢妄为。以无为的原则去作为，天下就没有治理不好的。",
    insight:"本章常被误解为愚民政策。其实老子的本意是：减少外在的诱惑和攀比，回归简单朴素的生活。「虚心」是放下贪念，「实腹」是满足基本需求，这是一种尊重自然本性的治理哲学。",
    concepts:["无知无欲","无为而治"]
  },
  {
    id:4, key:false, tag:"dao",
    title:"道冲不盈",
    text:"道冲，而用之或不盈。渊兮，似万物之宗；挫其锐，解其纷，和其光，同其尘。湛兮，似或存。吾不知谁之子，象帝之先。",
    trans:"道是虚空的，然而使用它却不会穷尽。深邃啊，像是万物的祖宗；收敛锐气，化解纷扰，和缓光辉，混同尘世。隐没啊，又似乎真实存在。我不知它是谁的后代，好像在上帝之前就已经存在了。",
    insight:"道虽虚空，却无穷无尽。它不张扬（和光同尘），不争锋（挫锐解纷），却是一切的根源。「和光同尘」成为后世处世哲学的经典表达——既有光芒又不刺眼，虽在尘世却不被污染。",
    concepts:["冲","和光同尘","先天地"]
  },
  {
    id:5, key:false, tag:"dao",
    title:"天地不仁",
    text:"天地不仁，以万物为刍狗；圣人不仁，以百姓为刍狗。天地之间，其犹橐龠乎？虚而不屈，动而愈出。多言数穷，不如守中。",
    trans:"天地无所偏爱，把万物当作祭祀用的草狗；圣人也无所偏爱，把百姓当作草狗。天地之间，不正像风箱吗？虚空却不会穷竭，越鼓动风越多。政令繁多反而加速败亡，不如保持虚静适中。",
    insight:"「天地不仁」并非残忍，而是大公无私——天地对万物一视同仁，不偏爱也不遗弃。这恰是最大的公平。风箱的比喻说明：越是人为干预，越容易出问题；保持中道虚静，自然生生不息。",
    concepts:["不仁","橐龠","守中"]
  },
  {
    id:6, key:false, tag:"dao",
    title:"谷神不死",
    text:"谷神不死，是谓玄牝。玄牝之门，是谓天地根。绵绵若存，用之不勤。",
    trans:"山谷般虚空的道是永恒不灭的，这叫做玄妙的母体。玄妙母体的产门，就是天地的根源。它绵延不绝似有似无，发挥作用永不穷竭。",
    insight:"谷神即道——如山谷般虚空却能包容万物，如母体般生育天地。它的力量不在刚猛，而在绵绵不绝。这是一种温柔却不可穷尽的力量。",
    concepts:["谷神","玄牝","天地根"]
  },
  {
    id:7, key:false, tag:"dao",
    title:"天长地久",
    text:"天长地久。天地所以能长且久者，以其不自生，故能长生。是以圣人后其身而身先，外其身而身存。非以其无私邪？故能成其私。",
    trans:"天长地久。天地所以能够长久，是因为它们不为自己而生存，所以能够长久生存。因此圣人把自己放在后面，反而占了先；把自身置之度外，反而保全了自己。这不正是因为他无私吗？所以反而成就了他自己。",
    insight:"长久的秘诀在于不贪图长久。天地不为自身谋利，反而永存。圣人效法天地，退后反进，忘我反存。这不是权谋之术，而是自然法则——无私是最大的自利。",
    concepts:["不自生","后其身","无私"]
  },
  {
    id:8, key:true, tag:"de",
    title:"上善若水",
    text:"上善若水。水善利万物而不争，处众人之所恶，故几于道。居善地，心善渊，与善仁，言善信，政善治，事善能，动善时。夫唯不争，故无尤。",
    trans:"最高的善像水一样。水善于滋润万物而不与之争，停留在众人不愿去的低洼之处，所以最接近于道。居处善于选择低下之地，心胸善于保持沉静，施与善于仁爱，说话善于守信，为政善于治理，做事善于发挥才能，行动善于把握时机。正因为不争，所以没有怨咎。",
    insight:"水是老子最推崇的意象：利万物而不争，处卑下而不怨，柔弱却能穿石。七善——居、心、与、言、政、事、动，是修德的七个维度。上善若水，是一种不争而胜的生存大智慧。",
    concepts:["水","不争","七善"]
  },
  {
    id:9, key:false, tag:"rou",
    title:"功遂身退",
    text:"持而盈之，不如其已；揣而锐之，不可长保。金玉满堂，莫之能守；富贵而骄，自遗其咎。功遂身退，天之道也。",
    trans:"端着水使它盈满，不如适时停止；捶打金属使它尖锐，锋利不能长久。金玉满堂，没有谁能守得住；富贵而骄横，是自己给自己招来灾祸。功成身退，才是天的法则。",
    insight:"物极必反——满了会溢，锐了会折，满了会失，骄了会败。老子告诫：功成之后要知道退，这不是怯懦，而是遵循天道。进退有度，方得长久。",
    concepts:["盈","退","天道"]
  },
  {
    id:10, key:false, tag:"de",
    title:"专气致柔",
    text:"载营魄抱一，能无离乎？专气致柔，能如婴儿乎？涤除玄览，能无疵乎？爱国治民，能无为乎？天门开阖，能为雌乎？明白四达，能无知乎？生之畜之，生而不有，为而不恃，长而不宰，是谓玄德。",
    trans:"承载精神抱守合一，能不分离吗？凝聚气息达到柔顺，能像婴儿一样吗？洗涤心灵的深处，能没有瑕疵吗？爱护国家治理百姓，能顺其自然吗？天门开合，能守雌柔吗？通达事理，能不用心机吗？生养万物而不占有，施为而不自恃，长养而不主宰，这就叫做玄德。",
    insight:"六个反问层层递进：从身心合一、回归柔弱、净化心灵到治世无为，最终指向「玄德」——生育而不占有，施为而不自恃，长养而不控制。这是德的最高境界。",
    concepts:["抱一","致柔","玄德"]
  },
  {
    id:11, key:false, tag:"dao",
    title:"无之为用",
    text:"三十辐共一毂，当其无，有车之用。埏埴以为器，当其无，有器之用。凿户牖以为室，当其无，有室之用。故有之以为利，无之以为用。",
    trans:"三十根辐条汇集到一个车毂上，正是因为车毂中间是空的，才有了车的作用。揉捏黏土做成器皿，正是因为器皿中间是空的，才有了器皿的作用。开凿门窗建造房屋，正是因为中间是空的，才有了房屋的作用。所以「有」给人便利，「无」发挥了它的作用。",
    insight:"车轮、器皿、房屋——有用的不是实体的「有」，而是中空的「无」。老子以此说明：无不是没有，而是真正的用处所在。我们常执着于看得见的东西，却忽略了空无才是发挥作用的关键。",
    concepts:["有与无","虚用"]
  },
  {
    id:12, key:false, tag:"de",
    title:"去彼取此",
    text:"五色令人目盲；五音令人耳聋；五味令人口爽；驰骋畋猎，令人心发狂；难得之货，令人行妨。是以圣人为腹不为目，故去彼取此。",
    trans:"缤纷的色彩使人眼睛昏花；繁杂的音乐使人耳朵失聪；丰美的滋味使人口味败坏；纵马打猎使人心发狂；稀有的货物使人行为失常。因此圣人只求填饱肚子而不追逐声色之娱，所以舍弃那个而选取这个。",
    insight:"外在感官的过度刺激反而蒙蔽本心。老子区分「为腹」（满足本质需求）和「为目」（追逐感官刺激），提醒我们回归内在的充实，远离外在的诱惑。",
    concepts:["为腹不为目","寡欲"]
  },
  {
    id:13, key:false, tag:"de",
    title:"宠辱若惊",
    text:"宠辱若惊，贵大患若身。何谓宠辱若惊？宠为下，得之若惊，失之若惊，是谓宠辱若惊。何谓贵大患若身？吾所以有大患者，为吾有身，及吾无身，吾有何患？故贵以身为天下，若可寄天下；爱以身为天下，若可托天下。",
    trans:"得宠和受辱都像受到惊恐，重视大祸患如同重视自身。什么叫宠辱若惊？得宠是卑下的，得到它会惊恐，失去它也会惊恐，这就是宠辱若惊。什么叫重视大患如同自身？我所以有大患，是因为我有自身，如果我没有自身，我还有什么祸患？所以能以看重自身的方式看待天下，才可以把天下寄托给他；以爱惜自身的方式爱惜天下，才可以把天下交付给他。",
    insight:"宠与辱都是外在的评判，被它们牵着走就失去了内心的安宁。老子指出：一切忧患的根源在于「有身」——太执着自我。超越自我的人，才能承担天下的重任。",
    concepts:["宠辱","无身","托天下"]
  },
  {
    id:14, key:false, tag:"dao",
    title:"执古之道",
    text:"视之不见名曰夷，听之不闻名曰希，搏之不得名曰微。此三者不可致诘，故混而为一。其上不皦，其下不昧。绳绳兮不可名，复归于无物。是谓无状之状，无物之象，是谓惚恍。迎之不见其首，随之不见其后。执古之道，以御今之有。能知古始，是谓道纪。",
    trans:"看它看不见叫夷，听它听不到叫希，摸它摸不着叫微。这三者无法追究到底，所以混合为一。它的上面不显得明亮，下面不显得阴暗。绵延不绝不可名状，回归到无形之物。这叫做没有形状的形状，没有物体的形象，这叫做惚恍。迎着它看不见它的头，跟着它看不见它的尾。把握自古以来的道，来驾驭现在的具体事物。能了解太初的本源，这叫做道的纲纪。",
    insight:"道超越感官——看不见、听不到、摸不着，却又无处不在。它不是具体的「物」，而是贯通古今的法则。执古御今，就是用永恒的规律来理解当下的世界。",
    concepts:["夷希微","惚恍","道纪"]
  },
  {
    id:15, key:false, tag:"de",
    title:"微妙玄通",
    text:"古之善为士者，微妙玄通，深不可识。夫唯不可识，故强为之容：豫兮若冬涉川，犹兮若畏四邻，俨兮其若客，涣兮若冰之将释，敦兮其若朴，旷兮其若谷，混兮其若浊。孰能浊以静之徐清？孰能安以动之徐生？保此道者不欲盈。夫唯不盈，故能蔽而新成。",
    trans:"古时善于修道的人，微妙通达，深刻得难以认识。正因为难以认识，所以勉强来描述他：迟疑啊像冬天涉水过河，谨慎啊像提防四邻，庄重啊像做客，松弛啊像冰将融化，敦厚啊像未雕琢的木头，空旷啊像山谷，混同啊像浊水。谁能在浊水中安静地使它慢慢澄清？谁能在安定中使它慢慢焕发生机？保持此道的人不求盈满。正因为不盈满，所以能去故更新。",
    insight:"修道者的七种姿态——谨慎、庄重、松弛、敦厚、空旷、混同，最后以浊水自清的比喻收束：不需要刻意去澄清浊水，只要安静下来，水自然变清。耐心、不盈满，就是修道的要诀。",
    concepts:["七容","不盈","徐清"]
  },
  {
    id:16, key:true, tag:"dao",
    title:"致虚守静",
    text:"致虚极，守静笃。万物并作，吾以观复。夫物芸芸，各复归其根。归根曰静，静曰复命。复命曰常，知常曰明。不知常，妄作凶。知常容，容乃公，公乃全，全乃天，天乃道，道乃久，没身不殆。",
    trans:"达到虚空的极致，坚守清静的笃实。万物一齐生长，我从中观察它们的循环往复。万物纷纷芸芸，各自回归它们的根本。回归根本叫做静，静叫做回归本性，回归本性叫做恒常，认识恒常叫做明智。不认识恒常，妄作妄为就会招来凶险。认识恒常才能包容，包容才能公正，公正才能周全，周全才能合天，合天才能合道，合道才能长久，终身不会遭受危险。",
    insight:"虚与静是修道最核心的方法论。万物无论多么繁盛，终将回归根本——如同叶子终将落回根部。认识这个循环往复的永恒规律（常），就能心胸开阔、行事公正、终身无殆。",
    concepts:["虚静","归根","复命","知常"]
  },
  {
    id:17, key:false, tag:"wu",
    title:"百姓皆谓我自然",
    text:"太上，不知有之；其次，亲而誉之；其次，畏之；其次，侮之。信不足焉，有不信焉。悠兮其贵言。功成事遂，百姓皆谓我自然。",
    trans:"最好的统治者，百姓不知道他的存在；其次的，百姓亲近并称赞他；再次的，百姓畏惧他；最差的，百姓侮辱他。信用不足，才有不信任。悠然而不多言。功成事就，百姓都说「我们本来就是这样的」。",
    insight:"治理的最高境界是被治者感受不到治理者的存在——一切自然而然地运转。次之才是被人爱戴，再次是被人畏惧，最差是被人鄙夷。好的领导者让团队觉得「是我们自己做到的」。",
    concepts:["太上","自然","贵言"]
  },
  {
    id:18, key:false, tag:"dao",
    title:"大道废有仁义",
    text:"大道废，有仁义；智慧出，有大伪；六亲不和，有孝慈；国家昏乱，有忠臣。",
    trans:"大道废弃了，才有仁义的出现；聪明智慧出现了，才有严重的伪诈；家庭不和睦了，才有孝慈的提倡；国家昏乱了，才有忠臣的产生。",
    insight:"仁义、智慧、孝慈、忠臣——这些看似正面的东西，恰恰说明大道已失。当自然和谐被打破，才需要人为的规范来补救。老子不是否定道德，而是指出：最好的状态是无需标榜道德。",
    concepts:["大道与仁义","返本"]
  },
  {
    id:19, key:false, tag:"wu",
    title:"见素抱朴",
    text:"绝圣弃智，民利百倍；绝仁弃义，民复孝慈；绝巧弃利，盗贼无有。此三者以为文不足，故令有所属：见素抱朴，少私寡欲，绝学无忧。",
    trans:"抛弃聪明和智巧，百姓就会获益百倍；抛弃仁和义，百姓就会恢复孝慈；抛弃巧诈和利欲，盗贼就不会出现。这三者作为文辞是不够的，所以还要让人心有所归属：表现单纯，保持朴实，减少私心，降低欲望，弃绝学问就没有忧虑。",
    insight:"绝圣弃智看似极端，实则是返璞归真。当人们不再追逐巧伪，自然归于淳朴。见素抱朴——保持本色和质朴，才是治本之策。",
    concepts:["见素抱朴","寡欲","绝学"]
  },
  {
    id:20, key:false, tag:"de",
    title:"独异于人",
    text:"唯之与阿，相去几何？善之与恶，相去若何？人之所畏，不可不畏。荒兮，其未央哉！众人熙熙，如享太牢，如春登台。我独泊兮，其未兆；沌沌兮，如婴儿之未孩；傫傫兮，若无所归。众人皆有余，而我独若遗。我愚人之心也哉！俗人昭昭，我独昏昏。俗人察察，我独闷闷。澹兮其若海，飂兮若无止。众人皆有以，而我独顽且鄙。我独异于人，而贵食母。",
    trans:"应诺和呵斥，相差多少？善和恶，相差多少？人们所畏惧的，不能不畏惧。荒远啊，没有尽头！众人兴高采烈，像参加盛宴，像春日登台远眺。我独自淡泊，没有征兆；浑浑沌沌，像还不会笑的婴儿；落寞啊，好像无家可归。众人都有富余，而我唯独像有所缺失。我这颗愚人的心啊！俗人明察精明，我却昏昏沉沉。俗人严厉苛刻，我却浑浑噩噩。沉静啊像大海，飘忽啊像不停息。众人都有所作为，唯独我愚顽而鄙陋。我唯独与人不同，而重视道的滋养。",
    insight:"这是老子最个人化的一章。众人追逐欢愉，他却选择淡泊；众人精明计较，他却选择浑朴。这不是真的愚笨，而是看透之后的超脱。「贵食母」——以道为根本，是他与众不同的原因。",
    concepts:["愚人之心","贵食母","独异于人"]
  },
  {
    id:21, key:false, tag:"dao",
    title:"孔德之容",
    text:"孔德之容，惟道是从。道之为物，惟恍惟惚。惚兮恍兮，其中有象兮；恍兮惚兮，其中有物兮。窈兮冥兮，其中有精兮；其精甚真，其中有信。自今及古，其名不去，以阅众甫。吾何以知众甫之状哉？以此。",
    trans:"大德的样态，只跟从于道。道作为物，恍恍惚惚。惚恍啊，其中有形象；恍惚啊，其中有实物。深远暗昧啊，其中有精微；这精微非常真实，其中有信验。从今到古，它的名字不会消去，以此来观察万物的开端。我怎么知道万物的开端是什么样呢？就是凭这个。",
    insight:"道虽恍惚，却不是虚无——其中有象、有物、有精、有信。德是道的显现，道是德的本源。修道不是追求虚无，而是在恍惚中体验那真实不虚的精微。",
    concepts:["德","恍惚","精","信"]
  },
  {
    id:22, key:false, tag:"rou",
    title:"曲则全",
    text:"曲则全，枉则直，洼则盈，敝则新，少则得，多则惑。是以圣人抱一为天下式。不自见故明，不自是故彰，不自伐故有功，不自矜故长。夫唯不争，故天下莫能与之争。古之所谓曲则全者，岂虚言哉！诚全而归之。",
    trans:"委曲反而能保全，弯曲反而能伸直，低洼反而能充盈，破旧反而能更新，少取反而能得，贪多反而迷惑。因此圣人抱守大道作为天下的法式。不自我表现所以明智，不自以为是所以彰显，不自我夸耀所以有功，不自高自大所以长久。正因为不争，所以天下没有能与之争的。古人说的委曲求全，难道是空话吗！实在是真能做到保全而归于此道。",
    insight:"六组辩证：曲/全、枉/直、洼/盈、敝/新、少/得、多/惑。退让不是失败，而是更高的策略。不争不是放弃，而是无人能与你争的境界。",
    concepts:["曲则全","抱一","不争"]
  },
  {
    id:23, key:false, tag:"wu",
    title:"希言自然",
    text:"希言自然。故飘风不终朝，骤雨不终日。孰为此者？天地。天地尚不能久，而况于人乎？故从事于道者，同于道；德者，同于德；失者，同于失。同于道者，道亦乐得之；同于德者，德亦乐得之；同于失者，失亦乐得之。信不足焉，有不信焉。",
    trans:"少说话是合乎自然的。狂风刮不了一早晨，暴雨下不了一整天。谁使它这样？天地。天地的狂暴尚且不能持久，何况人呢？所以从事于道的人就与道合一，从事于德的人就与德合一，从事于失的人就与失合一。与道合一的人，道也乐于得到他；与德合一的人，德也乐于得到他；与失合一的人，失也乐于得到他。信用不足，才有不信任。",
    insight:"天地间的暴烈行为无法持久——狂风骤雨终将平息。这是自然法则：极端不可持续。同理，人为的苛政暴行也不能长久。希言少令，顺其自然，才是可持续之道。",
    concepts:["希言","自然","同"]
  },
  {
    id:24, key:false, tag:"de",
    title:"企者不立",
    text:"企者不立；跨者不行；自见者不明；自是者不彰；自伐者无功；自矜者不长。其在道也，曰余食赘形。物或恶之，故有道者不处。",
    trans:"踮起脚尖站不稳；步子跨太大走不远；自我表现的不明智；自以为是的不彰显；自我夸耀的无功劳；自高自大的不长久。从道的角度看，这些叫做剩饭赘瘤。人们常常厌恶它们，所以有道的人不会这样做。",
    insight:"踮脚、跨步——勉强为之的动作无法持久。自我炫耀如同剩饭赘瘤，不仅无益反而招人厌恶。自然、从容才是正道。",
    concepts:["不自见","余食赘形"]
  },
  {
    id:25, key:true, tag:"dao",
    title:"道法自然",
    text:"有物混成，先天地生。寂兮寥兮，独立而不改，周行而不殆，可以为天地母。吾不知其名，强字之曰道，强为之名曰大。大曰逝，逝曰远，远曰反。故道大，天大，地大，人亦大。域中有四大，而人居其一焉。人法地，地法天，天法道，道法自然。",
    trans:"有一种东西混然而成，在天地形成之前就已存在。寂静无声啊，空虚无形啊，独立存在而不改变，循环运行而不停息，可以做天地的母亲。我不知道它的名字，勉强叫它做道，勉强称它为大。大叫做逝去，逝去叫做遥远，遥远叫做返回。所以道大，天大，地大，人也大。宇宙中有四大，而人是其中之一。人取法地，地取法天，天取法道，道取法自然。",
    insight:"「道法自然」是老子哲学的核心命题。道并非取法某个外在的东西，而是取法自己的本然状态——自然即「自己如此」。四大之中，人居其一，人通过效法天地最终回归自然之道。",
    concepts:["道法自然","四大","逝远反"]
  },
  {
    id:26, key:false, tag:"de",
    title:"重为轻根",
    text:"重为轻根，静为躁君。是以君子终日行不离辎重。虽有荣观，燕处超然。奈何万乘之主，而以身轻于天下？轻则失根，躁则失君。",
    trans:"重是轻的根本，静是躁的主宰。因此君子终日行走不离开载重的车辆。虽然身居华丽的宫殿，却能安然超处。为什么大国的君主，反而以自身轻率地对待天下？轻率就会失去根本，急躁就会失去主宰。",
    insight:"厚重是轻率的根基，沉静是浮躁的主宰。无论身处多么华丽的位置，都要保持内心的沉稳。轻浮则失本，急躁则失控——这对领导者尤为重要。",
    concepts:["重/轻","静/躁"]
  },
  {
    id:27, key:false, tag:"de",
    title:"善行无迹",
    text:"善行无辙迹；善言无瑕谪；善数不用筹策；善闭无关楗而不可开；善结无绳约而不可解。是以圣人常善救人，故无弃人；常善救物，故无弃物。是谓袭明。故善人者，不善人之师；不善人者，善人之资。不贵其师，不爱其资，虽智大迷，是谓要妙。",
    trans:"善于行走的不留痕迹；善于言辞的没有过失；善于计算的不用筹码；善于关闭的不用门闩却打不开；善于捆绑的不用绳索却解不开。因此圣人总是善于拯救人，所以没有被遗弃的人；总是善于物尽其用，所以没有被废弃的物。这叫做内藏明慧。所以善人是不善之人的老师，不善之人是善人的资借。不尊重老师，不珍惜资借，虽然聪明也是大迷惑，这叫做精要玄妙。",
    insight:"真正的善——善行、善言、善数、善闭、善结——不着痕迹，不费力气，却效果最好。圣人眼里没有无用之人、无用之物，这是最高明的智慧。",
    concepts:["五善","袭明","无弃人"]
  },
  {
    id:28, key:false, tag:"de",
    title:"知白守黑",
    text:"知其雄，守其雌，为天下溪。为天下溪，常德不离，复归于婴儿。知其白，守其黑，为天下式。为天下式，常德不忒，复归于无极。知其荣，守其辱，为天下谷。为天下谷，常德乃足，复归于朴。朴散则为器，圣人用之则为官长，故大制不割。",
    trans:"深知雄强，却安守雌柔，做天下的溪涧。做天下的溪涧，永恒的德不会离失，回归到婴儿的状态。深知明亮，却安守暗黑，做天下的法式。做天下的法式，永恒的德不会有差错，回归到无穷。深知荣耀，却安守屈辱，做天下的山谷。做天下的山谷，永恒的德才能充足，回归到质朴。质朴分散就成为器物，圣人使用它就成为首领，所以大制不割裂。",
    insight:"知雄守雌、知白守黑、知荣守辱——不是不知道强、明、荣，而是有意选择柔、暗、辱。这是有实力而不用实力的从容。复归婴儿、无极、朴——返本归元，大制不割。",
    concepts:["守雌","守黑","守辱","复归于朴"]
  },
  {
    id:29, key:false, tag:"wu",
    title:"天下神器",
    text:"将欲取天下而为之，吾见其不得已。天下神器，不可为也，不可执也。为者败之，执者失之。夫物或行或随；或歔或吹；或强或羸；或载或隳。是以圣人去甚，去奢，去泰。",
    trans:"想要夺取天下而强行作为，我看他达不到目的。天下是神圣的器物，不能强行作为，不能强行把持。作为的必然失败，把持的必然失去。世间万物，有的走在前面有的跟在后面；有的轻嘘有的急吹；有的强壮有的瘦弱；有的安稳有的颠覆。因此圣人去除极端，去除奢侈，去除过度。",
    insight:"天下不可强为——越是强加控制，越容易失控。万物各有其性，强求一律必然失败。圣人之道在于去甚、去奢、去泰——不走极端，不过度。",
    concepts:["神器","去甚去奢去泰"]
  },
  {
    id:30, key:false, tag:"wu",
    title:"不以兵强天下",
    text:"以道佐人主者，不以兵强天下。其事好还。师之所处，荆棘生焉。大军之后，必有凶年。善有果而已，不敢以取强。果而勿矜，果而勿伐，果而勿骄，果而不得已，果而勿强。物壮则老，是谓不道，不道早已。",
    trans:"用道辅佐君主的人，不用兵力在天下逞强。这种事情容易遭到报应。军队驻扎的地方，荆棘丛生。大战之后，必定有荒年。善用兵的只求达到目的而已，不敢用它来逞强。达到目的而不自大，达到目的而不夸耀，达到目的而不骄傲，达到目的实属不得已，达到目的而不逞强。事物壮盛就会走向衰老，这叫做不合乎道，不合乎道就会很快消亡。",
    insight:"战争是不得已的手段，绝非值得炫耀的力量。即便胜利，也应保持克制和哀悯。物壮则老——越是逞强，越快走向衰亡。真正的强者知道适可而止。",
    concepts:["兵","好还","物壮则老"]
  },
  {
    id:31, key:false, tag:"wu",
    title:"兵者不祥",
    text:"夫兵者，不祥之器，物或恶之，故有道者不处。君子居则贵左，用兵则贵右。兵者不祥之器，非君子之器，不得已而用之，恬淡为上。胜而不美，而美之者，是乐杀人。夫乐杀人者，则不可得志于天下矣。吉事尚左，凶事尚右。偏将军居左，上将军居右。言以丧礼处之。杀人之众，以悲哀泣之，战胜以丧礼处之。",
    trans:"兵器是不祥的东西，人们厌恶它，所以有道的人不使用它。君子平时以左为贵，用兵时以右为贵。兵器是不祥之物，不是君子所用的东西，不得已才使用它，恬静淡泊为上。胜利了也不美化它，美化它就是以杀人为乐。以杀人为乐的人，不可能在天下得志。吉庆的事以左为上，凶丧的事以右为上。偏将军在左边，上将军在右边——这是说用丧礼来对待战争。杀人众多，以悲痛哀悼泣之，战胜了也以丧礼来处理。",
    insight:"这是老子最深切的反战宣言。即便战胜，也要以丧礼处之——因为每一场胜利背后都是生命的消逝。真正的强者对战争怀有哀痛，而非欢庆。",
    concepts:["兵不祥","丧礼处之"]
  },
  {
    id:32, key:false, tag:"dao",
    title:"道常无名",
    text:"道常无名、朴。虽小，天下莫能臣。侯王若能守之，万物将自宾。天地相合，以降甘露，民莫之令而自均。始制有名，名亦既有，夫亦将知止，知止可以不殆。譬道之在天下，犹川谷之于江海。",
    trans:"道永远是无名的、质朴的。虽然微小，天下却没有谁能使它臣服。侯王如果能守持它，万物将会自动归从。天地交合，降下甘露，人们没有命令它却自然均匀。有了制度就有了名称，名称既然有了，也就应该知道适可而止，知道适可而止就不会有危险。道在天下，就像川谷流向江海。",
    insight:"道虽朴素无名气量微小，却没有什么能让它屈服。治国者守道，万物自然归顺。关键在于知止——名分制度设立之后要知道限度，不知止则危。",
    concepts:["无名之朴","知止","自宾"]
  },
  {
    id:33, key:true, tag:"de",
    title:"自知者明",
    text:"知人者智，自知者明。胜人者有力，自胜者强。知足者富，强行者有志。不失其所者久，死而不亡者寿。",
    trans:"了解别人的是聪明，了解自己的是明智。战胜别人的是有力，战胜自己的是坚强。知道满足的是富有，坚持力行的是有志。不失掉根本的能长久，身死而精神不灭的才是长寿。",
    insight:"六层递进——知人/自知、胜人/自胜、知足/强行，指向内求的智慧。向外看容易，向内观很难；胜人凭力，胜己靠心。最终「死而不亡」——肉体消亡而精神永存，才是真正的寿。",
    concepts:["自知","自胜","知足","死而不亡"]
  },
  {
    id:34, key:false, tag:"dao",
    title:"大道泛兮",
    text:"大道泛兮，其可左右。万物恃之以生而不辞，功成而不有。衣养万物而不为主。常无欲，可名于小；万物归焉而不为主，可名为大。以其终不自为大，故能成其大。",
    trans:"大道广泛流行，无所不到。万物依赖它生长而不推辞，功成而不自居。养育万物而不自以为主。永远没有欲望，可以称它为小；万物归附而不自以为主，又可以称它为大。正因为它始终不自以为大，所以才能成就它的伟大。",
    insight:"道无处不在，既可称小（无欲无求），又可称大（万物归附）。伟大不是自封的，恰恰来自不自以为大的谦逊。这和「上善若水」的精神一脉相承。",
    concepts:["不有","不为主","不自大"]
  },
  {
    id:35, key:false, tag:"dao",
    title:"执大象天下往",
    text:"执大象，天下往。往而不害，安平太。乐与饵，过客止。道之出口，淡乎其无味，视之不足见，听之不足闻，用之不足既。",
    trans:"执守大道，天下人都来归往。归往而不互相伤害，于是安宁平和。音乐和美食，能使过客停留。道说出来，淡得没有味道，看它不足以看见，听它不足以听到，用它却用不完。",
    insight:"道不如音乐美食那样有吸引力，看上去平淡无味，但它的作用无穷无尽。感官刺激是短暂的，道的作用是永恒的。",
    concepts:["大象","淡而无味","用之不既"]
  },
  {
    id:36, key:false, tag:"rou",
    title:"柔弱胜刚强",
    text:"将欲歙之，必固张之；将欲弱之，必固强之；将欲废之，必固兴之；将欲取之，必固与之。是谓微明。柔弱胜刚强。鱼不可脱于渊，国之利器不可以示人。",
    trans:"将要收敛它，必须暂且扩张它；将要削弱它，必须暂且加强它；将要废除它，必须暂且兴举它；将要夺取它，必须暂且给予它。这叫做微明的道理。柔弱战胜刚强。鱼不能脱离深渊，国家的利器不可以随意炫耀给人看。",
    insight:"事物发展到极点必然走向反面——扩张到极致就会收敛，强盛到极致就会衰弱。这就是「微明」——看似柔弱实即将取胜。但此理如同国之利器，不可轻易示人。",
    concepts:["微明","柔弱胜刚强","利器"]
  },
  {
    id:37, key:true, tag:"wu",
    title:"道常无为",
    text:"道常无为而无不为。侯王若能守之，万物将自化。化而欲作，吾将镇之以无名之朴。镇之以无名之朴，夫将不欲。不欲以静，天下将自定。",
    trans:"道永远是无为的，却没有一件事不是它所为。侯王如果能守持它，万物将自动化育。化育中如果有贪欲萌动，我将用无名的质朴来镇定它。用无名的质朴来镇定，贪欲就不会产生。不生贪欲而归于宁静，天下将自然安定。",
    insight:"「无为而无不为」——道不刻意作为，却没有什么做不成的。关键在于：不干预不等于不作为，而是顺应自然。即使欲念萌动，以朴镇之，以静化之，天下自定。这是《道经》的收官之章。",
    concepts:["无为无不为","无名之朴","自定"]
  },
  {
    id:38, key:true, tag:"de",
    title:"上德不德",
    text:"上德不德，是以有德；下德不失德，是以无德。上德无为而无以为；下德无为而有以为。上仁为之而无以为；上义为之而有以为。上礼为之而莫之应，则攘臂而扔之。故失道而后德，失德而后仁，失仁而后义，失义而后礼。夫礼者，忠信之薄而乱之首。前识者，道之华而愚之始。是以大丈夫处其厚，不居其薄；处其实，不居其华。故去彼取此。",
    trans:"上德不表现为有德，所以是有德；下德刻意不失德，所以是无德。上德无为而没有目的；下德无为而有目的。上仁有所作为却没有目的；上义有所作为且有目的。上礼有所作为却得不到回应，就伸出胳膊强拉别人。所以道丧失了才有德，德丧失了才有仁，仁丧失了才有义，义丧失了才有礼。礼这个东西，是忠信的淡薄和祸乱的开端。所谓的先见之明，是道的虚华和愚昧的开始。因此大丈夫立身敦厚，不居于浅薄；存心笃实，不居于虚华。所以舍弃那个而选取这个。",
    insight:"这是《德经》的开篇，也是全书最深刻的段落之一。老子排出一个递降序列：道→德→仁→义→礼——越是强调外在规范，说明内在的本质越失。真正的德不自觉其为德，刻意行善反而非德。厚与薄、实与华的选择，决定了修行的方向。",
    concepts:["上德/下德","道→德→仁→义→礼","处厚不居薄"]
  },
  {
    id:39, key:false, tag:"dao",
    title:"昔之得一者",
    text:"昔之得一者，天得一以清；地得一以宁；神得一以灵；谷得一以盈；万物得一以生；侯王得一以为天下正。其致之也，谓天无以清，将恐裂；地无以宁，将恐废；神无以灵，将恐歇；谷无以盈，将恐竭；万物无以生，将恐灭；侯王无以正，将恐蹶。故贵以贱为本，高以下为基。是以侯王自称孤、寡、不谷。此非以贱为本邪？非乎？故致誉无誉。是故不欲琭琭如玉，珞珞如石。",
    trans:"从前得道的：天得道而清明，地得道而安宁，神得道而灵验，河谷得道而充盈，万物得道而生长，侯王得道而成为天下首领。推而言之，天不能保持清明，恐怕要崩裂；地不能保持安宁，恐怕要塌陷；神不能保持灵验，恐怕要消失；河谷不能保持充盈，恐怕要枯竭；万物不能保持生长，恐怕要灭绝；侯王不能保持天下首领，恐怕要颠覆。所以贵以贱为根本，高以下为基础。因此侯王自称孤、寡、不谷。这不是以贱为根本吗？不是吗？所以最高的荣誉无需赞誉。因此不愿像美玉那样华丽，而愿像石头那样坚实。",
    insight:"一即道。天、地、神、谷、万物、侯王——一切因道而存，失道则亡。高贵以卑贱为根基，侯王以谦称自处。不欲如玉之华，宁为石之实。",
    concepts:["得一","贵以贱为本","珞珞如石"]
  },
  {
    id:40, key:true, tag:"dao",
    title:"反者道之动",
    text:"反者道之动，弱者道之用。天下万物生于有，有生于无。",
    trans:"循环往复是道的运动，柔弱是道的作用。天下万物产生于有，有产生于无。",
    insight:"仅仅二十一个字，却浓缩了老子哲学的核心。反——循环往复，是道的运动规律；弱——柔弱不争，是道的发挥作用的方式。有生于无——一切存在从虚无中诞生。这是宇宙观的极致精简。",
    concepts:["反","弱","有生于无"]
  },
  {
    id:41, key:false, tag:"dao",
    title:"大器晚成",
    text:"上士闻道，勤而行之；中士闻道，若存若亡；下士闻道，大笑之。不笑不足以为道。故建言有之：明道若昧；进道若退；夷道若颣；上德若谷；广德若不足；建德若偷；质真若渝；大白若辱；大方无隅；大器晚成；大音希声；大象无形；道隐无名。夫唯道，善贷且成。",
    trans:"上士听了道，努力去实行；中士听了道，半信半疑；下士听了道，哈哈大笑——不被嘲笑就不足以称为道。所以古语说：光明的道好像暗昧，前进的道好像后退，平坦的道好像崎岖，崇高的德好像低谷，广大的德好像不足，刚健的德好像懈怠，质朴纯真好好像浑浊，最洁白的好像含污垢，最大的方没有棱角，最大的器皿最后完成，最大的声音听不到，最大的形象看不到，道隐藏无名。只有道，善于辅助万物并成就万物。",
    insight:"大器晚成、大音希声、大象无形——真正的伟大常常看似平凡甚至相反。道被下士嘲笑，恰恰说明它超越了世俗的认知。理解道需要耐心和悟性，而非聪明。",
    concepts:["大器晚成","大音希声","大象无形","道隐无名"]
  },
  {
    id:42, key:true, tag:"dao",
    title:"万物负阴而抱阳",
    text:"道生一，一生二，二生三，三生万物。万物负阴而抱阳，冲气以为和。人之所恶，唯孤、寡、不谷，而王公以为称。故物或损之而益，或益之而损。人之所教，我亦教之。强梁者不得其死，吾将以为教父。",
    trans:"道产生统一体，统一体产生阴阳两面，阴阳产生调和之气，调和之气产生万物。万物背负阴而怀抱阳，冲荡之气使之和谐。人们所厌恶的，就是孤、寡、不谷，而王公却用来称呼自己。所以事物有时减损它反而获益，增益它反而受损。别人教导的，我也用来教导：强横的人不得好死，我把这作为教诲的根本。",
    insight:"宇宙生成论的核心：道→一→二→三→万物。阴阳交汇形成和谐之气，万物由此而生。「负阴抱阳」说明万物都包含对立面，关键在于冲气为和——在对立中找到平衡。",
    concepts:["道生一","阴/阳","冲气为和"]
  },
  {
    id:43, key:false, tag:"rou",
    title:"天下之至柔",
    text:"天下之至柔，驰骋天下之至坚。无有入无间。吾是以知无为之有益。不言之教，无为之益，天下希及之。",
    trans:"天下最柔弱的东西，能穿透天下最坚硬的东西。无形的力量能进入没有间隙的物体。我因此知道无为是有益的。不言的教化，无为的利益，天下很少有人能做到。",
    insight:"水能穿石，风能蚀岩——至柔驰骋至坚。无形的力量（无有）可以穿透任何密不透风的东西（无间）。无为不是不做事，而是用最柔软的方式达到最深远的效果。",
    concepts:["至柔/至坚","无有入无间","无为有益"]
  },
  {
    id:44, key:false, tag:"de",
    title:"知足不辱",
    text:"名与身孰亲？身与货孰多？得与亡孰病？甚爱必大费；多藏必厚亡。故知足不辱，知止不殆，可以长久。",
    trans:"名声和生命哪个更亲？生命和财货哪个更重？得到和失去哪个更有害？过分爱惜必然付出重大代价，过多收藏必然遭受惨重损失。所以知道满足就不会遭受屈辱，知道适可而止就不会遇到危险，这样才可以长久。",
    insight:"三问直指人心——名与身、身与货、得与亡。追问到底：什么才是真正重要的？知足、知止，是避免灾祸、保持长远的根本智慧。",
    concepts:["知足","知止","长久"]
  },
  {
    id:45, key:false, tag:"rou",
    title:"大巧若拙",
    text:"大成若缺，其用不弊。大盈若冲，其用不穷。大直若屈，大巧若拙，大辩若讷。静胜躁，寒胜热。清静为天下正。",
    trans:"最完美的好像有欠缺，但它的作用不会衰竭。最充盈的好像是空的，但它的作用不会穷尽。最正直的好像弯曲，最灵巧的好像笨拙，最善辩的好像口吃。静胜过躁，寒胜过热。清静可以做天下的首领。",
    insight:"大成若缺、大巧若拙、大辩若讷——真正的圆满、灵巧、雄辩都带着某种「缺陷」。这不是伪装，而是不被外在的完美所束缚。清静才是天下的正道。",
    concepts:["大成若缺","大巧若拙","清静"]
  },
  {
    id:46, key:false, tag:"de",
    title:"知足之足",
    text:"天下有道，却走马以粪；天下无道，戎马生于郊。祸莫大于不知足；咎莫大于欲得。故知足之足，常足矣。",
    trans:"天下有道，战马退回田间施肥；天下无道，战马在郊野产驹。祸患没有大于不知足的，罪过没有大于贪得无厌的。所以知足的满足，才是永远的满足。",
    insight:"治世战马归田，乱世战马生郊——战争与和平取决于统治者是否知足。知足不是安于现状，而是对贪欲的警惕。「知足之足」——由知足而来的满足，才是真正不会失去的满足。",
    concepts:["知足","常足"]
  },
  {
    id:47, key:false, tag:"dao",
    title:"不出户知天下",
    text:"不出户，知天下；不窥牖，见天道。其出弥远，其知弥少。是以圣人不行而知，不见而明，不为而成。",
    trans:"不出大门，就能知道天下的事；不望窗外，就能看见天道。走出去越远，知道的越少。因此圣人不远行就能知晓，不亲见就能明了，不妄为就能成功。",
    insight:"向内求而非向外觅。道不在远方的旅途上，而在内心的观照中。走得越远，心越散乱，反而越不了解本质。圣人之知，来自内心的虚静澄明。",
    concepts:["不行而知","不见而明","不为而成"]
  },
  {
    id:48, key:true, tag:"wu",
    title:"为道日损",
    text:"为学日益，为道日损。损之又损，以至于无为。无为而无不为矣。取天下常以无事，及其有事，不足以取天下。",
    trans:"求学在于每天增加知识，求道在于每天减少执念。减少再减少，最终达到无为。无为就能无所不为。治理天下要用不扰民的方法，等到频繁扰民，就不配治理天下了。",
    insight:"学与道的方向截然相反——学是加法，道是减法。修道不是获得更多，而是放下更多：放下成见、贪欲、执念，直到无为。无为之时，反而无所不能。减法的智慧。",
    concepts:["为学日益","为道日损","无为无不为"]
  },
  {
    id:49, key:false, tag:"de",
    title:"圣人常无心",
    text:"圣人常无心，以百姓心为心。善者吾善之，不善者吾亦善之；德善。信者吾信之，不信者吾亦信之；德信。圣人在天下，歙歙焉，为天下浑其心，百姓皆注其耳目，圣人皆孩之。",
    trans:"圣人没有固定的心意，以百姓的心为自己的心。善良的人我善待他，不善良的人我也善待他，这样就得到了善。诚信的人我信任他，不诚信的人我也信任他，这样就得到了信。圣人在天下，收敛克制，为天下人浑朴心志。百姓都专注于耳目之欲，圣人却把他们当孩子看待。",
    insight:"圣人之心——无私心，以百姓之心为心；无分别，善与不善皆善待，信与不信皆信任。这不是天真，而是以大包容化解对立，以浑朴之心对待天下。",
    concepts:["以百姓心为心","德善","德信"]
  },
  {
    id:50, key:false, tag:"de",
    title:"出生入死",
    text:"出生入死。生之徒，十有三；死之徒，十有三；人之生，动之于死地，亦十有三。夫何故？以其生生之厚。盖闻善摄生者，路行不遇兕虎，入军不被甲兵；兕无所投其角，虎无所用其爪，兵无所容其刃。夫何故？以其无死地。",
    trans:"出世为生，入地为死。属于长寿的，十分之三；属于短命的，十分之三；本来可以长生却自己走向死地的，也十分之三。为什么？因为奉养太过分了。听说善于养生的人，路上行走不会遇到犀牛和老虎，进入军阵不会受到杀伤；犀牛无处投角，老虎无处施爪，兵器无处容刃。为什么？因为他没有进入死亡的范围。",
    insight:"过分贪生反而致死——养生太过、纵欲太过、恐惧太过，都是走向死地。善摄生者不与危险对抗，而是根本不进入危险的领域。无死地——不给自己制造致死的原因。",
    concepts:["生生之厚","善摄生","无死地"]
  },
  {
    id:51, key:false, tag:"dao",
    title:"道生德畜",
    text:"道生之，德畜之，物形之，势成之。是以万物莫不尊道而贵德。道之尊，德之贵，夫莫之命而常自然。故道生之，德畜之，长之育之，亭之毒之，养之覆之。生而不有，为而不恃，长而不宰，是谓玄德。",
    trans:"道生成万物，德蓄养万物，物赋予形态，势成就万物。因此万物没有不尊崇道而珍视德的。道之所以受尊崇，德之所以受珍视，是因为它们从不发号施令而永远顺应自然。所以道生成万物，德蓄养万物，使它们生长、发育、结果、成熟，对它们抚养、保护。生养而不占有，施为而不自恃，长养而不主宰，这叫做玄德。",
    insight:"万物生成的四个阶段：道生→德畜→物形→势成。道与德从不发号施令，一切顺其自然。玄德——生而不有、为而不恃、长而不宰——是最高形态的爱。",
    concepts:["道生德畜","玄德","常自然"]
  },
  {
    id:52, key:false, tag:"de",
    title:"天下有始",
    text:"天下有始，以为天下母。既得其母，以知其子；既知其子，复守其母，没身不殆。塞其兑，闭其门，终身不勤；开其兑，济其事，终身不救。见小曰明，守柔曰强。用其光，复归其明，无遗身殃；是为袭常。",
    trans:"天下有本始，作为天下的母亲。既然得知了母亲，就能认识她的孩子；既然认识了孩子，又要回过来守持母亲，终身就不会有危险。塞住感官的孔窍，关上嗜欲的门径，终身不会劳累；打开感官的孔窍，去忙世俗的事情，终身不可救药。能察见微小的叫做明智，能持守柔弱的叫做坚强。使用外在的光，回归内在的明，不给自身招来灾祸，这叫做承袭永恒。",
    insight:"母是道/本源，子是万物/现象。认识万物之后要回归本源，不可只停留在现象层面。塞兑闭门——收敛感官，回归内守。见小守柔——在细微处洞察，在柔弱处坚守。",
    concepts:["母与子","塞兑闭门","袭常"]
  },
  {
    id:53, key:false, tag:"wu",
    title:"使我介然有知",
    text:"使我介然有知，行于大道，唯施是畏。大道甚夷，而人好径。朝甚除，田甚芜，仓甚虚；服文采，带利剑，厌饮食，财货有余；是为盗夸。非道也哉！",
    trans:"假使我稍有认识，在大道上行走，最怕的就是走邪路。大道很平坦，可是人们偏偏喜欢走小路。朝廷非常腐败，田地非常荒芜，仓库非常空虚；穿着华丽的衣服，佩带锋利的宝剑，饱足饮食，财货有余——这叫做强盗头子。不是正道啊！",
    insight:"老子痛斥当政者的奢靡腐败：朝廷华丽而田地荒芜，权贵奢侈而国库空虚——这不是正道，而是盗行。直白的批评，尖锐的讽刺。",
    concepts:["大道甚夷","好径","盗夸"]
  },
  {
    id:54, key:false, tag:"de",
    title:"善建者不拔",
    text:"善建者不拔，善抱者不脱，子孙以祭祀不辍。修之于身，其德乃真；修之于家，其德乃余；修之于乡，其德乃长；修之于邦，其德乃丰；修之于天下，其德乃普。故以身观身，以家观家，以乡观乡，以邦观邦，以天下观天下。吾何以知天下然哉？以此。",
    trans:"善于建树的不可能被拔除，善于抱持的不可能被摆脱，子孙因此世世代代祭祀不断。修之于自身，他的德就纯真；修之于家族，他的德就有余；修之于乡里，他的德就长久；修之于邦国，他的德就丰厚；修之于天下，他的德就普及。所以以自身观照自身，以家族观照家族，以乡里观照乡里，以邦国观照邦国，以天下观照天下。我怎么知道天下的情况呢？就是用这个方法。",
    insight:"德之修养由内而外：身→家→乡→邦→天下。内在的德越真，外在的影响越广。观照的方法也是由近及远——先看清自己，才能看清天下。",
    concepts:["善建不拔","修身","以观"]
  },
  {
    id:55, key:false, tag:"de",
    title:"含德之厚",
    text:"含德之厚，比于赤子。毒虫不螫，猛兽不据，攫鸟不搏。骨弱筋柔而握固。未知牝牡之合而朘作，精之至也。终日号而不嗄，和之至也。知和曰常，知常曰明。益生曰祥。心使气曰强。物壮则老，谓之不道，不道早已。",
    trans:"含德深厚的人，好比初生的婴儿。毒虫不螫他，猛兽不伤害他，凶鸟不搏击他。骨头柔弱筋脉柔软却握得很紧，不懂得男女交合小生殖器却勃起，这是精气到了极点。整天啼哭却不沙哑，这是和气到了极点。认识和谐叫做常，认识常叫做明。贪求生活享受叫做灾殃，心念驱使精气叫做逞强。事物壮盛就会衰老，叫做不合乎道，不合乎道就会很快消亡。",
    insight:"赤子（婴儿）是德的最高象征——无欲无害、精气充沛、和谐自然。他不需要对抗危险，因为危险根本不来。益生（贪求长生）反而招灾，使气（逞强）反而早亡。",
    concepts:["赤子","精之至","和之至","知和曰常"]
  },
  {
    id:56, key:false, tag:"de",
    title:"知者不言",
    text:"知者不言，言者不知。塞其兑，闭其门，挫其锐，解其纷，和其光，同其尘，是谓玄同。故不可得而亲，不可得而疏；不可得而利，不可得而害；不可得而贵，不可得而贱。故为天下贵。",
    trans:"真正了解的不妄言，妄言的并不真正了解。塞住感官的孔窍，关上嗜欲的门径，收敛锐气，化解纷扰，和缓光辉，混同尘世，这就叫做玄同。所以不可能与他亲近，也不可能与他疏远；不可能使他获利，也不可能使他受害；不可能使他尊贵，也不可能使他卑贱。所以他被天下所尊崇。",
    insight:"玄同——与道合一的境界，超越了亲疏、利害、贵贱的一切分别。达到此境界的人不被外物所动摇，因此为天下所贵。",
    concepts:["知者不言","玄同","和光同尘"]
  },
  {
    id:57, key:false, tag:"wu",
    title:"以正治国",
    text:"以正治国，以奇用兵，以无事取天下。吾何以知其然哉？以此：天下多忌讳，而民弥贫；人多利器，国家滋昏；人多伎巧，奇物滋起；法令滋彰，盗贼多有。故圣人云：我无为，而民自化；我好静，而民自正；我无事，而民自富；我无欲，而民自朴。",
    trans:"以正道治国，以奇谋用兵，以不扰民来取得天下。我怎么知道应该如此呢？根据如下：天下禁忌越多，百姓越贫穷；民间武器越多，国家越混乱；人们技巧越多，奇异之物越兴起；法令越严明，盗贼越多。所以圣人说：我无为，百姓自然教化；我好静，百姓自然端正；我不扰民，百姓自然富足；我没有贪欲，百姓自然淳朴。",
    insight:"四个「自」——自化、自正、自富、自朴——揭示了无为而治的核心理念。禁忌越多越穷，法令越严越乱——过度干预适得其反。治大国如烹小鲜，少翻少动。",
    concepts:["无为自化","四自","无事取天下"]
  },
  {
    id:58, key:true, tag:"rou",
    title:"祸兮福所倚",
    text:"其政闷闷，其民淳淳；其政察察，其民缺缺。祸兮，福之所倚；福兮，祸之所伏。孰知其极？其无正也。正复为奇，善复为妖。人之迷，其日固久。是以圣人方而不割，廉而不刿，直而不肆，光而不耀。",
    trans:"政治宽厚，百姓淳朴；政治严苛，百姓狡诈。灾祸啊，幸福依傍在它里面；幸福啊，灾祸潜伏在它之中。谁知道它的终极？没有定准。正再转为邪，善再转为恶。人们的迷惑，日子已经很久了。因此圣人方正而不割人，锐利而不伤人，正直而不放肆，明亮而不耀眼。",
    insight:"祸福相依、正邪互转——这是老子辩证法最著名的表达。没有绝对的祸，也没有绝对的福。圣人处世之道：方而不割、廉而不刿、直而不肆、光而不耀——有原则而不伤人，有锋芒而不刺人。",
    concepts:["祸福相依","正复为奇","光而不耀"]
  },
  {
    id:59, key:false, tag:"de",
    title:"治人事天",
    text:"治人事天，莫若啬。夫唯啬，是谓早服；早服谓之重积德；重积德则无不克；无不克则莫知其极；莫知其极，可以有国；有国之母，可以长久；是谓深根固柢，长生久视之道。",
    trans:"治理百姓侍奉天道，没有比节俭更好的了。只有节俭，这叫做早做准备；早做准备叫做不断积德；不断积德就无往不胜；无往不胜就没有人知道他的极限；没有人知道他的极限，就可以保有国家；掌握治国的根本，就可以长治久安——这就叫深根固柢、长生久视的道理。",
    insight:"啬——节俭、爱惜、不浪费——是治人事天的根本。啬则早备，早备则积德，积德则无不胜，最终深根固柢、长久不衰。一切从节俭开始。",
    concepts:["啬","积德","深根固柢"]
  },
  {
    id:60, key:false, tag:"wu",
    title:"治大国若烹小鲜",
    text:"治大国，若烹小鲜。以道莅天下，其鬼不神；非其鬼不神，其神不伤人；非其神不伤人，圣人亦不伤人。夫两不相伤，故德交归焉。",
    trans:"治理大国，如同烹煎小鱼。以道来面对天下，鬼神就不会显灵；不是鬼神不显灵，而是它的灵验不伤害人；不是灵验不伤害人，圣人也不伤害人。两者都不伤害人，所以德归交于此。",
    insight:"烹小鲜不能翻来覆去——翻多了鱼就碎了。治国同理：法令不可朝令夕改，政策不可频繁变动。以道治国，鬼神圣人都不伤民，德自然归聚。",
    concepts:["烹小鲜","不伤人","德交归"]
  },
  {
    id:61, key:false, tag:"rou",
    title:"大者宜为下",
    text:"大邦者下流，天下之牝，天下之交也。牝常以静胜牡，以静为下。故大邦以下小邦，则取小邦；小邦以下大邦，则取大邦。故或下以取，或下而取。大邦不过欲兼畜人，小邦不过欲入事人。夫两者各得所欲，大者宜为下。",
    trans:"大国要像江河的下游，做天下的雌柔，做天下的交汇。雌柔常以沉静胜过雄强，因为沉静处于下方。所以大国对小国谦下，就能取得小国的信赖；小国对大国谦下，就能取得大国的庇护。所以有的是谦下来取得，有的是谦下而被取得。大国不过想兼养小国，小国不过想入侍大国。两者各得其所，大国尤其应该谦下。",
    insight:"大国如处下游，才能海纳百川。谦下不是弱，而是聚——水往低处流，人往谦处聚。在国际关系中，大国的谦下比强势更有感召力。",
    concepts:["下流","牝/牡","大者宜为下"]
  },
  {
    id:62, key:false, tag:"dao",
    title:"道者万物之奥",
    text:"道者万物之奥。善人之宝，不善人之所保。美言可以市尊，美行可以加人。人之不善，何弃之有？故立天子，置三公，虽有拱璧以先驷马，不如坐进此道。古之所以贵此道者何？不曰：求以得，有罪以免邪？故为天下贵。",
    trans:"道是万物的庇荫。善人珍视它，不善的人也需要它保全。美言可以换取尊崇，美行可以加于他人。不善的人，为什么要抛弃他们呢？所以立天子、设三公，虽然有拱璧在前驷马随后的礼仪，不如安坐而进献此道。古来重视此道的原因是什么？不就是：有求可以得到，有罪可以免除吗？所以道为天下所贵。",
    insight:"道庇护万物——善人与不善人，无一例外。这是道的伟大之处：不抛弃任何人。美言美行尚有价值，何况大道？求则得、罪可免——道是终极的庇护。",
    concepts:["万物之奥","不弃不善","求以得"]
  },
  {
    id:63, key:false, tag:"wu",
    title:"天下大事必作于细",
    text:"为无为，事无事，味无味。大小多少。报怨以德。图难于其易，为大于其细；天下难事，必作于易；天下大事，必作于细。是以圣人终不为大，故能成其大。夫轻诺必寡信。多易必多难。是以圣人犹难之，故终无难矣。",
    trans:"以无为的原则去作为，以无事的方式去做事，以无味的态度去品味。大生于小，多起于少。用德来回报怨恨。谋划难事要从容易处入手，做大事要从细微处做起；天下的难事，必定从容易的做起；天下的大事，必定从细微的做起。因此圣人始终不自以为大，所以能成就大。轻易许诺必定缺少信用，把事情看得太容易必定遭遇很多困难。因此圣人尚且把事情看得困难，所以最终没有困难。",
    insight:"大事必作于细，难事必作于易——这是行动的方法论。轻诺寡信、多易多难——对困难要有充分的预估。圣人之所以最终无难，恰恰因为他始终把事情当作难事来对待。",
    concepts:["为无为","大事作于细","轻诺寡信"]
  },
  {
    id:64, key:true, tag:"wu",
    title:"千里之行始于足下",
    text:"其安易持，其未兆易谋；其脆易泮，其微易散。为之于未有，治之于未乱。合抱之木，生于毫末；九层之台，起于累土；千里之行，始于足下。为者败之，执者失之。是以圣人无为故无败，无执故无失。民之从事，常于几成而败之。慎终如始，则无败事。是以圣人欲不欲，不贵难得之货；学不学，复众人之所过，以辅万物之自然而不敢为。",
    trans:"安定的容易维持，未露苗头的容易谋划；脆弱的容易消解，微小的容易散失。在事情未发生之前就行动，在未乱之前就治理。合抱的大树，生于细小的幼芽；九层的高台，起于一筐筐的泥土；千里的远行，始于脚下第一步。强行作为的必然失败，强行把持的必然失去。因此圣人不妄为所以不失败，不把持所以不丢失。人们做事，常在接近成功时失败。慎终如始，就不会有失败的事。因此圣人欲求别人不欲求的，不珍视难得的货物；学别人不学的，回归众人的过失之处，以辅助万物的自然而不敢妄为。",
    insight:"四个生动的比喻——合抱之木、九层之台、千里之行——说明一切伟大都始于微小的积累。慎终如始：很多人败在接近成功时的松懈。圣人之道：欲不欲、学不学、辅自然、不敢为。",
    concepts:["慎终如始","千里始于足下","辅万物自然"]
  },
  {
    id:65, key:false, tag:"wu",
    title:"古之善为道者",
    text:"古之善为道者，非以明民，将以愚之。民之难治，以其智多。故以智治国，国之贼；不以智治国，国之福。知此两者亦稽式。常知稽式，是谓玄德。玄德深矣，远矣，与物反矣，然后乃至大顺。",
    trans:"古时善于行道的人，不是让百姓精明智巧，而是让他们淳朴。百姓难以治理，是因为他们智巧太多。所以用智巧治理国家，是国家的祸害；不用智巧治理国家，是国家的福气。知道这两者也是治国的法则。常知这个法则，叫做玄德。玄德深啊远啊，与万物返归本真，然后才能达到大顺。",
    insight:"「愚民」不是使百姓愚昧，而是保持淳朴自然——与「虚心实腹」同义。以智巧治国，人人算计，反而生乱。以淳朴治国，人人安居，才是国之福。",
    concepts:["愚之","以智治国","玄德","大顺"]
  },
  {
    id:66, key:false, tag:"rou",
    title:"江海为百谷王",
    text:"江海所以能为百谷王者，以其善下之，故能为百谷王。是以圣人欲上民，必以言下之；欲先民，必以身后之。是以圣人处上而民不重，处前而民不害。是以天下乐推而不厌。以其不争，故天下莫能与之争。",
    trans:"江海之所以能成为百谷之王，是因为它善于处在低下的位置，所以能成为百谷之王。因此圣人想要居于百姓之上，必须对他们言语谦下；想要走在百姓前面，必须把自己放在他们后面。所以圣人身处高位而百姓不觉得沉重，走在前面而百姓不觉得受害。所以天下乐于推举他而不厌弃。因为他不争，所以天下没有能与他争的。",
    insight:"江海为百谷王——因为它处下。领导者要居上不重、居前不害，必须学会谦下与退后。不争之争，是领导力的最高境界。",
    concepts:["善下","不争","处上不重"]
  },
  {
    id:67, key:true, tag:"de",
    title:"我有三宝",
    text:"天下皆谓我大，大而不肖。夫唯不肖，故能大。若肖，久矣其细也夫！我有三宝，持而保之。一曰慈，二曰俭，三曰不敢为天下先。慈故能勇；俭故能广；不敢为天下先，故能成器长。今舍慈且勇；舍俭且广；舍后且先；死矣！夫慈，以战则胜，以守则固。天将救之，以慈卫之。",
    trans:"天下人都说我的道大，大得不像任何具体的东西。正因为不像，所以能大。如果像什么，早就渺小了！我有三件法宝，坚持并保全它们：第一叫慈爱，第二叫节俭，第三叫不敢居于天下人之先。慈爱所以能勇敢，节俭所以能广大，不敢为天下先所以能成为万物的首长。现在舍弃慈爱而求勇敢，舍弃节俭而求广大，舍弃退后而求领先——必定灭亡！慈爱，用来征战就能胜利，用来守卫就能坚固。天要拯救谁，就用慈爱来保卫他。",
    insight:"三宝——慈、俭、不敢为天下先——是老子修行和处世的根本原则。慈不是软弱而是大勇，俭不是吝啬而是广大的根基，不先是退让而成首长的智慧。三宝缺一不可。",
    concepts:["三宝","慈","俭","不敢为先"]
  },
  {
    id:68, key:false, tag:"de",
    title:"善为士者不武",
    text:"善为士者，不武；善战者，不怒；善胜敌者，不与；善用人者，为之下。是谓不争之德，是谓用人之力，是谓配天古之极。",
    trans:"善于做将帅的，不逞勇武；善于作战的，不轻易发怒；善于胜敌的，不与敌人正面冲突；善于用人的，对人谦下。这叫做不争的品德，这叫做利用别人的力量，这叫做配合天道——自古以来的最高准则。",
    insight:"四种善——善士不武、善战不怒、善胜不与、善人为下——都是不争之德。真正的高手不需要炫耀武力、发泄怒气、正面硬拼，而是以柔克刚、以谦服人。",
    concepts:["不争之德","用人之力","配天"]
  },
  {
    id:69, key:false, tag:"wu",
    title:"用兵有言",
    text:"用兵有言：吾不敢为主而为客；不敢进寸而退尺。是谓行无行；攘无臂；扔无敌；执无兵。祸莫大于轻敌，轻敌几丧吾宝。故抗兵相若，哀者胜矣。",
    trans:"用兵的人说过：我不敢主动进犯而采取守势，不敢前进一寸而宁可后退一尺。这叫做行军却看不出行列，奋臂却看不出手臂，面对敌人却像没有敌人，手执兵器却像没有兵器。祸患没有比轻敌更大的了，轻敌几乎丧失了我的三宝。所以两军对垒实力相当时，悲愤的一方会获胜。",
    insight:"用兵之道：不主动、不冒进，以退为进。但绝不可轻敌——轻敌则丧三宝（慈、俭、不敢为先）。哀兵必胜——不是因为他更强，而是因为他被迫应战、心存悲悯，所以能激发最大的力量。",
    concepts:["为客不为主","轻敌","哀兵胜"]
  },
  {
    id:70, key:false, tag:"dao",
    title:"吾言甚易知",
    text:"吾言甚易知，甚易行。天下莫能知，莫能行。言有宗，事有君。夫唯无知，是以不我知也。知我者希，则我者贵。是以圣人被褐而怀玉。",
    trans:"我的话很容易理解，很容易实行。天下却没有谁能理解，没有谁能实行。言论有主旨，行事有根据。正因为人们不了解这个道理，所以不了解我。了解我的人稀少，效法我的人珍贵。因此圣人穿着粗布衣服而怀里揣着美玉。",
    insight:"大道至简，却少有人行。不是因为道理复杂，而是因为人心复杂——做不到无为、不争、守柔。「被褐怀玉」——外表朴素，内藏珍宝，是得道者的写照。",
    concepts:["易知易行","被褐怀玉"]
  },
  {
    id:71, key:false, tag:"de",
    title:"知不知上",
    text:"知不知，尚矣；不知知，病也。圣人不病，以其病病。夫唯病病，是以不病。",
    trans:"知道却自以为不知道，这是最好的；不知道却自以为知道，这就是毛病。圣人不犯这个毛病，因为他把这种毛病当作毛病。正因为把毛病当作毛病，所以不犯毛病。",
    insight:"苏格拉底说「我唯一知道的就是我什么都不知道」，老子说「知不知上」——东西方哲人殊途同归。承认无知是智慧的开端，自以为知则是最大的病。",
    concepts:["知不知","病病"]
  },
  {
    id:72, key:false, tag:"wu",
    title:"民不畏威",
    text:"民不畏威，则大威至。无狎其所居，无厌其所生。夫唯不厌，是以不厌。是以圣人自知不自见；自爱不自贵。故去彼取此。",

// ============ 全局变量 ============
let currentFilter = 'all';
let searchTerm = '';
let currentChapterIndex = -1;
let visibleChapters = [];

// ============ 渲染卡片 ============
function renderCards() {
  const grid = document.getElementById('chaptersGrid');
  grid.innerHTML = '';

  const filtered = chapters.filter(ch => {
    // 筛选
    if (currentFilter === 'key' && !ch.key) return false;
    if (currentFilter === 'dao' && ch.tag !== 'dao') return false;
    if (currentFilter === 'de' && ch.tag !== 'de') return false;
    if (currentFilter === 'wu' && ch.tag !== 'wu') return false;
    if (currentFilter === 'rou' && ch.tag !== 'rou') return false;
    // 搜索
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return ch.text.includes(s) || ch.trans.includes(s) || ch.title.includes(s) || ch.concepts.some(c => c.includes(s));
    }
    return true;
  });

  visibleChapters = filtered;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>没有找到匹配的章节</p></div>';
    return;
  }

  filtered.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = `chapter-card${ch.key ? ' key-chapter' : ''}`;
    card.setAttribute('data-id', ch.id);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `第${ch.id}章 ${ch.title}`);

    const tagMap = { dao:'道之本体', de:'德之修行', wu:'无为而治', rou:'柔弱胜强' };

    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">第${ch.id}章</span>
        <span class="card-title">${ch.title}</span>
      </div>
      <div class="card-excerpt">${ch.text}</div>
      <div class="card-footer">
        <span class="card-tag">${tagMap[ch.tag] || ''}</span>
        <span class="card-read">阅读 <i class="fas fa-arrow-right" style="font-size:0.65rem"></i></span>
      </div>
    `;

    card.addEventListener('click', () => openModal(ch.id));
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(ch.id); }
    });

    grid.appendChild(card);

    // 渐入动画
    setTimeout(() => {
      card.classList.add('visible');
    }, Math.min(i * 40, 600));
  });
}

// ============ 模态框 ============
function openModal(chapterId) {
  const ch = chapters.find(c => c.id === chapterId);
  if (!ch) return;

  currentChapterIndex = visibleChapters.findIndex(c => c.id === chapterId);

  const overlay = document.getElementById('modalOverlay');
  const label = document.getElementById('modalLabel');
  const keyBadge = document.getElementById('modalKeyBadge');
  const body = document.getElementById('modalBody');
  const indicator = document.getElementById('navIndicator');

  label.textContent = `第${ch.id}章 · ${ch.title}`;
  keyBadge.style.display = ch.key ? 'inline' : 'none';

  const tagMap = { dao:'道之本体', de:'德之修行', wu:'无为而治', rou:'柔弱胜强' };

  body.innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title"><i class="fas fa-scroll"></i> 原文</div>
      <div class="modal-original">${ch.text}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title"><i class="fas fa-language"></i> 译文</div>
      <div class="modal-translation">${ch.trans}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title"><i class="fas fa-lightbulb"></i> 解读</div>
      <div class="modal-insight">${ch.insight}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title"><i class="fas fa-tags"></i> 核心概念 · ${tagMap[ch.tag]}</div>
      <div class="modal-key-concepts">
        ${ch.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('')}
      </div>
    </div>
  `;

  // 导航按钮
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentChapterIndex <= 0;
  nextBtn.disabled = currentChapterIndex >= visibleChapters.length - 1;
  indicator.textContent = `${currentChapterIndex + 1} / ${visibleChapters.length}`;

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ============ 事件绑定 ============
document.addEventListener('DOMContentLoaded', () => {
  renderCards();

  // 筛选按钮
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderCards();
    });
  });

  // 搜索
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value.trim();
    renderCards();
  });

  // 关闭模态框
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // 键盘导航
  document.addEventListener('keydown', (e) => {
    const overlay = document.getElementById('modalOverlay');
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
    if (overlay.classList.contains('active')) {
      if (e.key === 'ArrowLeft') {
        document.getElementById('prevBtn').click();
      } else if (e.key === 'ArrowRight') {
        document.getElementById('nextBtn').click();
      }
    }
  });

  // 上一章/下一章
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (currentChapterIndex > 0) {
      openModal(visibleChapters[currentChapterIndex - 1].id);
    }
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (currentChapterIndex < visibleChapters.length - 1) {
      openModal(visibleChapters[currentChapterIndex + 1].id);
    }
  });

  // 返回顶部
  const backTop = document.getElementById('backTop');
  const filterBar = document.getElementById('filterBar');

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    if (scrollY > 400) {
      backTop.classList.add('show');
    } else {
      backTop.classList.remove('show');
    }
    if (scrollY > 100) {
      filterBar.classList.add('scrolled');
    } else {
      filterBar.classList.remove('scrolled');
    }
  });

  backTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>
